openapi: 3.1.0
info:
  title: BeeBlast API Reference
  description: |
    Complete API reference for BeeBlast. Two surfaces:

    - **Direct API** — account-authenticated agent runtime endpoint (sync SSE, async jobs, status polling, external tool completion)
    - **Account Management** — tenant configuration (accounts, agents, skills, secrets)
  version: 0.1.0

servers:
  - url: https://{functionUrl}.lambda-url.{region}.on.aws
    description: Deployed Function URL
    variables:
      functionUrl:
        default: your-function-url
        description: Your deployed Function URL ID
      region:
        default: us-east-1
        description: AWS deployment region

security:
  - BearerAuth: []

tags:
  - name: Direct API
    description: Agent runtime for sync SSE, async jobs, status polling, and external tool completion.
  - name: Accounts
    description: Account lifecycle, metadata, and secret rotation.
  - name: Agents
    description: Account-owned agent configuration.
  - name: Skills
    description: Account-owned skill package management.
  - name: Cron Jobs
    description: Account-owned scheduled agent runs.

paths:
  /:
    get:
      tags:
        - Direct API
      summary: Health probe
      description: Unauthenticated lightweight probe for the deployed harness-processing Function URL.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  method:
                    type: string
                    example: POST
              examples:
                healthy:
                  value:
                    status: ok
                    method: POST

    post:
      tags:
        - Direct API
      summary: Sync direct API (SSE)
      description: |
        Run a synchronous direct agent turn. Returns an SSE stream with Vercel AI SDK stream events.

        The SSE stream uses the [Vercel AI SDK wire protocol](https://sdk.vercel.ai/docs/ai-sdk-core/streaming#data-stream-protocol). Common event types include `step-start`, `text`, `tool-call`, `tool-result`, `tool-approval-request`, `step-finish`, and `finish`. When `model.output` is configured, a final `structured-output` event carries the parsed JSON value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectApiRequest'
            examples:
              basic:
                summary: Basic request
                value:
                  agentId: agent_abc123
                  eventId: unique-id-for-dedup
                  conversationKey: conversation-identifier
                  events:
                    - role: user
                      content:
                        - type: text
                          text: Hello
              withSystem:
                summary: With ephemeral system event
                value:
                  agentId: agent_abc123
                  eventId: unique-id-for-dedup
                  conversationKey: conversation-identifier
                  events:
                    - role: system
                      content: The next answer should be terse.
                      persist: false
                    - role: user
                      content:
                        - type: text
                          text: What is the capital of France?
      responses:
        '200':
          description: SSE stream of agent execution
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
              examples:
                streamEvents:
                  summary: Common SSE events
                  value: |
                    event: 0
                    data: {"type":"step-start","messageId":"msg_123"}

                    event: 0
                    data: {"type":"text","text":"Hello"}

                    event: 0
                    data: {"type":"tool-call","toolCallId":"tc_1","toolName":"filesystem","input":{"shell":"ls"}}

                    event: 0
                    data: {"type":"tool-result","toolCallId":"tc_1","toolName":"filesystem","output":"file.txt"}

                    event: 0
                    data: {"type":"step-finish","finishReason":"stop","usage":{"promptTokens":100,"completionTokens":50}}

                    event: 0
                    data: {"type":"finish","finishReason":"stop"}
        '404':
          description: Direct API disabled (ENABLE_DIRECT_API=false)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /async:
    post:
      tags:
        - Direct API
      summary: Async direct API
      description: Queue an async direct agent turn. Returns immediately with a status URL for polling. The async worker runs the same account-scoped harness code in the background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectApiRequest'
            examples:
              basic:
                summary: Basic async request
                value:
                  agentId: agent_abc123
                  eventId: async-unique-id
                  conversationKey: conversation-identifier
                  events:
                    - role: user
                      content:
                        - type: text
                          text: Generate a summary of today's news
      responses:
        '200':
          description: Async job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusUrl:
                    type: string
                    format: uri
              examples:
                accepted:
                  value:
                    statusUrl: https://your-function-url.lambda-url.us-east-1.on.aws/status/async-unique-id?agentId=agent_abc123
        '404':
          description: Direct API disabled (ENABLE_DIRECT_API=false)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /status/{eventId}:
    get:
      tags:
        - Direct API
      summary: Poll async status
      description: Poll the status of an async job. Responses are backed by the account-scoped `AsyncAgentResult` DynamoDB record.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current job status
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StatusProcessing'
                  - $ref: '#/components/schemas/StatusAwaitingApproval'
                  - $ref: '#/components/schemas/StatusCompleted'
                  - $ref: '#/components/schemas/StatusFailed'
              examples:
                processing:
                  summary: Job still running
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: processing
                awaitingApproval:
                  summary: Tool approval needed
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: awaiting_approval
                    approvals:
                      - approvalId: approval-123
                        toolCallId: tool-call-456
                        toolName: filesystem
                        input:
                          shell: rm file.txt
                completed:
                  summary: Job finished
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: completed
                    response:
                      answer: done
                failed:
                  summary: Job failed
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: failed
                    error: Model provider returned 503
        '404':
          description: Unknown event ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventId:
                    type: string
                  status:
                    type: string
              examples:
                notFound:
                  value:
                    eventId: unknown-id
                    status: not_found
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /async-tools/{resultId}/complete:
    post:
      tags:
        - Direct API
      summary: Complete external async tool
      description: Complete an externally dispatched async tool. Completion settles one `AsyncToolResult` row. A sealed dispatch-group item waits for every sibling result before continuing the parent.
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ToolCompletionSuccess'
                - $ref: '#/components/schemas/ToolCompletionFailure'
            examples:
              success:
                summary: Tool completed
                value:
                  status: completed
                  response:
                    answer: done
                    data:
                      - 1
                      - 2
                      - 3
              failure:
                summary: Tool failed
                value:
                  status: failed
                  error: External service timeout after 30s
      responses:
        '200':
          description: Tool result settled
        '202':
          description: Waiting for more async tools in dispatch group
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
              examples:
                waiting:
                  value:
                    status: waiting_for_async_tools
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /accounts:
    post:
      tags:
        - Accounts
      summary: Create account
      description: Public endpoint to create a new account. IP-rate-limited. Store `accountSecret` securely — it is not recoverable.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  description: Required human-readable account name
                description:
                  type: string
                  description: Optional purpose or usage note
            examples:
              basic:
                value:
                  username: company-a
              withDescription:
                value:
                  username: company-a
                  description: Company A account
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  accountSecret:
                    type: string
              examples:
                created:
                  value:
                    account:
                      accountId: acct_abc123
                      username: company-a
                      description: Company A account
                    accountSecret: fp_acct_xyz789...
        '429':
          description: Rate limited

    get:
      tags:
        - Accounts
      summary: List all accounts (admin)
      description: Admin-only endpoint. Requires `AdminAccountSecret` from SST secrets.
      security:
        - AdminAuth: []
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
              examples:
                list:
                  value:
                    - accountId: acct_abc123
                      username: company-a
                      description: Company A account
                    - accountId: acct_def456
                      username: company-b
                      description: Company B account

  /accounts/{accountId}:
    get:
      tags:
        - Accounts
      summary: Get account (admin)
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    patch:
      tags:
        - Accounts
      summary: Update account (admin)
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    delete:
      tags:
        - Accounts
      summary: Delete account (admin)
      description: Deletes the account and cascades cleanup for all account-scoped data (conversations, agents, skills, filesystem objects, async results).
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              examples:
                deleted:
                  value:
                    deleted: true
                    cleanup:
                      conversationsDeleted: 12
                      processedEventsDeleted: 14
                      asyncAgentResultDeleted: 2
                      asyncToolResultDeleted: 3
                      filesystemObjectsDeleted: 8
                      agentsDeleted: 1
                      skillObjectsDeleted: 4

  /accounts/{accountId}/rotate-secret:
    post:
      tags:
        - Accounts
      summary: Rotate account secret (admin)
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountSecret:
                    type: string
              examples:
                rotated:
                  value:
                    accountSecret: fp_acct_new...

  /accounts/me:
    get:
      tags:
        - Accounts
      summary: Get own account
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    patch:
      tags:
        - Accounts
      summary: Update own account
      description: Update account metadata only. Runtime config is managed through agent endpoints.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                description:
                  type: string
            examples:
              updateDescription:
                value:
                  description: Updated account purpose
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
              examples:
                updated:
                  value:
                    accountId: acct_abc123
                    username: company-a
                    description: Updated account purpose

    delete:
      tags:
        - Accounts
      summary: Delete own account
      description: Deletes the authenticated account and cascades cleanup for all account-scoped data.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'

  /accounts/me/rotate-secret:
    post:
      tags:
        - Accounts
      summary: Rotate own secret
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountSecret:
                    type: string
              examples:
                rotated:
                  value:
                    accountSecret: fp_acct_new...

  /accounts/me/agents:
    post:
      tags:
        - Agents
      summary: Create agent
      description: Create a new agent under the authenticated account. The `agentId` in the response is required for all runtime requests.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Visible to parent agents when allowed as subagent
                config:
                  $ref: '#/components/schemas/AgentConfig'
            examples:
              basic:
                summary: Minimal agent
                value:
                  name: support-agent
                  description: Customer support agent
                  config:
                    provider:
                      google:
                        apiKey: your-api-key
                    model:
                      provider: google
                      modelId: gemini-3-flash
                    agent:
                      system: You are a helpful support assistant.
              withWorkspace:
                summary: Agent with workspace and tools
                value:
                  name: research-agent
                  description: Research assistant with web search
                  config:
                    provider:
                      google:
                        apiKey: your-api-key
                    model:
                      provider: google
                      modelId: gemini-3-flash
                      temperature: 0.2
                    agent:
                      system: You are a research assistant. Always cite sources.
                    workspace:
                      enabled: true
                      memory:
                        enabled: true
                        namespace: research
                      tasks:
                        enabled: true
                    tools:
                      tavilySearch:
                        enabled: true
                        apiKey: your-tavily-key
                        searchDepth: advanced
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: '#/components/schemas/Agent'
              examples:
                created:
                  value:
                    agent:
                      accountId: acct_abc123
                      agentId: agent_xyz789
                      name: support-agent
                      description: Customer support agent

    get:
      tags:
        - Agents
      summary: List agents
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'

  /accounts/me/agents/{agentId}:
    get:
      tags:
        - Agents
      summary: Get agent
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    patch:
      tags:
        - Agents
      summary: Update agent
      description: Config patch is a deep merge. Redacted secret placeholders (`********`) preserve existing secrets. Set a field to `null` to delete it.
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                config:
                  $ref: '#/components/schemas/AgentConfig'
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    delete:
      tags:
        - Agents
      summary: Delete agent
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent deleted

  /accounts/me/skills:
    post:
      tags:
        - Skills
      summary: Create skill
      description: Upload a skill. Skills are stored in S3 under `<accountId>/<skill-name>`. Every bundle must include a root `SKILL.md` with `name` and `description` YAML frontmatter.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
                - name
                - description
              properties:
                source:
                  type: string
                  enum: [json, base64, github]
                name:
                  type: string
                description:
                  type: string
                content:
                  type: string
                  description: Skill content (for json source)
            examples:
              json:
                value:
                  source: json
                  name: support-flow
                  description: Handles support triage
                  content: "# Support Flow\n\nClassify urgency, product area, and next action."
      responses:
        '201':
          description: Skill created
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Skill'
              examples:
                created:
                  value:
                    skill:
                      skillPath: acct_abc123/support-flow
                      name: support-flow
                      description: Handles support triage

    get:
      tags:
        - Skills
      summary: List skills
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'

  /accounts/me/skills/{skillName}:
    get:
      tags:
        - Skills
      summary: Get skill
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

    put:
      tags:
        - Skills
      summary: Update skill
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

    delete:
      tags:
        - Skills
      summary: Delete skill
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill deleted

  /accounts/me/cron-jobs:
    post:
      tags:
        - Cron Jobs
      summary: Create cron job
      description: Create a scheduled agent run.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CronJobCreate'
            examples:
              agentRun:
                value:
                  name: Daily maintenance
                  agentId: agent_maintainer
                  conversationKey: cron:daily-maintenance
                  prompt: Run daily maintenance.
                  scheduleExpression: cron(0 8 * * ? *)
                  timezone: Europe/Amsterdam
      responses:
        '201':
          description: Cron job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  cronJob:
                    $ref: '#/components/schemas/CronJob'
        '503':
          description: Cron jobs unavailable

    get:
      tags:
        - Cron Jobs
      summary: List cron jobs
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of cron jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  cronJobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/CronJob'

  /accounts/me/cron-jobs/{cronJobId}:
    get:
      tags:
        - Cron Jobs
      summary: Get cron job
      security:
        - BearerAuth: []
      parameters:
        - name: cronJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cron job details
          content:
            application/json:
              schema:
                type: object
                properties:
                  cronJob:
                    $ref: '#/components/schemas/CronJob'

    patch:
      tags:
        - Cron Jobs
      summary: Update cron job
      security:
        - BearerAuth: []
      parameters:
        - name: cronJobId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CronJobPatch'
      responses:
        '200':
          description: Cron job updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  cronJob:
                    $ref: '#/components/schemas/CronJob'

    delete:
      tags:
        - Cron Jobs
      summary: Delete cron job
      security:
        - BearerAuth: []
      parameters:
        - name: cronJobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cron job deleted

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Account secret obtained from account creation or rotation
    AdminAuth:
      type: http
      scheme: bearer
      description: AdminAccountSecret from SST secrets

  schemas:
    DirectApiRequest:
      type: object
      required:
        - agentId
        - eventId
        - events
      properties:
        agentId:
          type: string
          description: Selects the account-owned agent config to run
        eventId:
          type: string
          description: Used for account-scoped deduplication
        conversationKey:
          type: string
          description: Selects the account-scoped persisted direct conversation
        events:
          type: array
          description: Vercel AI SDK-style messages
          items:
            $ref: '#/components/schemas/Message'

    Message:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, system, tool]
          description: "System events must use `persist: false` and are only supported on the direct API path"
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ContentBlock'
        persist:
          type: boolean
          description: Must be `false` for system events. Request-local, not stored in DynamoDB.

    ContentBlock:
      type: object
      discriminator:
        propertyName: type
      oneOf:
        - $ref: '#/components/schemas/TextContent'
        - $ref: '#/components/schemas/ImageContent'
        - $ref: '#/components/schemas/FileContent'
        - $ref: '#/components/schemas/ToolCallContent'
        - $ref: '#/components/schemas/ToolResultContent'
        - $ref: '#/components/schemas/ReasoningContent'
        - $ref: '#/components/schemas/SourceUrlContent'
        - $ref: '#/components/schemas/SourceDocumentContent'
        - $ref: '#/components/schemas/ToolApprovalRequestContent'
        - $ref: '#/components/schemas/ToolApprovalResponseContent'

    TextContent:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          example: text
        text:
          type: string
          example: Hello

    ImageContent:
      type: object
      required:
        - type
        - image
      properties:
        type:
          type: string
          example: image
        image:
          type: string
          description: Base64-encoded image data, URL, or File reference
        mimeType:
          type: string
          description: MIME type of the image (e.g., `image/png`, `image/jpeg`)

    FileContent:
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
          example: file
        data:
          type: string
          description: Base64-encoded file data, URL, or File reference
        mimeType:
          type: string
          description: MIME type of the file
        filename:
          type: string

    ToolCallContent:
      type: object
      required:
        - type
        - toolCallId
        - toolName
        - input
      properties:
        type:
          type: string
          example: tool-call
        toolCallId:
          type: string
        toolName:
          type: string
        input:
          type: object
          description: Tool input arguments as generated by the model

    ToolResultContent:
      type: object
      required:
        - type
        - toolCallId
        - toolName
        - output
      properties:
        type:
          type: string
          example: tool-result
        toolCallId:
          type: string
        toolName:
          type: string
        output:
          description: Tool execution result. Can be any JSON value.
        isError:
          type: boolean

    ReasoningContent:
      type: object
      required:
        - type
        - reasoning
      properties:
        type:
          type: string
          example: reasoning
        reasoning:
          type: string
          description: Model's internal reasoning trace (not shown to end users)

    SourceUrlContent:
      type: object
      required:
        - type
        - source
      properties:
        type:
          type: string
          example: source-url
        source:
          type: object
          properties:
            sourceType:
              type: string
              example: url
            url:
              type: string
            title:
              type: string

    SourceDocumentContent:
      type: object
      required:
        - type
        - source
      properties:
        type:
          type: string
          example: source-document
        source:
          type: object
          properties:
            sourceType:
              type: string
              example: document
            documentId:
              type: string
            title:
              type: string
            mediaType:
              type: string

    ToolApprovalRequestContent:
      type: object
      required:
        - type
        - approvalId
        - toolCallId
        - toolName
        - input
      properties:
        type:
          type: string
          example: tool-approval-request
        approvalId:
          type: string
        toolCallId:
          type: string
        toolName:
          type: string
        input:
          type: object
          description: Tool input awaiting user approval

    ToolApprovalResponseContent:
      type: object
      required:
        - type
        - approvalId
        - approved
      properties:
        type:
          type: string
          example: tool-approval-response
        approvalId:
          type: string
          description: Required to match the decision to the pending tool call
        approved:
          type: boolean
          description: Set to false to deny the tool execution
        reason:
          type: string
          description: Reason for approval or denial

    StatusProcessing:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string

    StatusAwaitingApproval:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
        approvals:
          type: array
          items:
            type: object
            properties:
              approvalId:
                type: string
              toolCallId:
                type: string
              toolName:
                type: string
              input:
                type: object

    StatusCompleted:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
        response:
          type: object
          description: Parsed JSON value when structured output is configured

    StatusFailed:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
        error:
          type: string

    ToolCompletionSuccess:
      type: object
      required:
        - status
        - response
      properties:
        status:
          type: string
        response:
          type: object

    ToolCompletionFailure:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: string
        error:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

    Account:
      type: object
      properties:
        accountId:
          type: string
        username:
          type: string
        description:
          type: string

    Agent:
      type: object
      properties:
        accountId:
          type: string
        agentId:
          type: string
        name:
          type: string
        description:
          type: string

    Skill:
      type: object
      properties:
        skillPath:
          type: string
        name:
          type: string
        description:
          type: string

    CronJob:
      type: object
      properties:
        accountId:
          type: string
        cronJobId:
          type: string
        name:
          type: string
        description:
          type: string
        agentId:
          type: string
          description: Account-owned agent to run
        prompt:
          type: string
          description: User prompt sent to the agent on each schedule invocation
        conversationKey:
          type: string
          description: Optional public conversation key. Defaults to `cron:{cronJobId}`.
        scheduleExpression:
          type: string
          description: EventBridge Scheduler expression, such as `cron(...)`, `rate(...)`, or `at(...)`
        timezone:
          type: string
        status:
          type: string
          enum: [active, paused]
        createdAt:
          type: string
        updatedAt:
          type: string
        lastInvokedAt:
          type: string
        lastStatus:
          type: string
          enum: [started, completed, failed]
        lastError:
          type: string

    CronJobCreate:
      type: object
      required:
        - name
        - agentId
        - prompt
        - scheduleExpression
      properties:
        name:
          type: string
        description:
          type: string
        agentId:
          type: string
          example: agent_maintainer
        prompt:
          type: string
          example: Run daily maintenance.
        conversationKey:
          type: string
          example: cron:daily-maintenance
        scheduleExpression:
          type: string
          example: cron(0 8 * * ? *)
        timezone:
          type: string
          example: Europe/Amsterdam
        status:
          type: string
          enum: [active, paused]

    CronJobPatch:
      type: object
      properties:
        name:
          type: string
        description:
          oneOf:
            - type: string
            - type: "null"
        agentId:
          type: string
        prompt:
          type: string
        conversationKey:
          oneOf:
            - type: string
            - type: "null"
        scheduleExpression:
          type: string
        timezone:
          oneOf:
            - type: string
            - type: "null"
        status:
          type: string
          enum: [active, paused]

    DeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        cleanup:
          type: object
          properties:
            conversationsDeleted:
              type: integer
            processedEventsDeleted:
              type: integer
            asyncAgentResultDeleted:
              type: integer
            asyncToolResultDeleted:
              type: integer
            filesystemObjectsDeleted:
              type: integer
            agentsDeleted:
              type: integer
            skillObjectsDeleted:
              type: integer
            cronJobsDeleted:
              type: integer

    AgentConfig:
      type: object
      description: Agent runtime configuration passed via agent create/update. Config patch is a deep merge.
      properties:
        provider:
          $ref: '#/components/schemas/ProviderConfig'
        model:
          $ref: '#/components/schemas/ModelConfig'
        agent:
          $ref: '#/components/schemas/AgentRuntimeConfig'
        hooks:
          $ref: '#/components/schemas/HooksConfig'
        skills:
          $ref: '#/components/schemas/SkillsConfig'
        subagent:
          $ref: '#/components/schemas/SubagentConfig'
        workspace:
          $ref: '#/components/schemas/WorkspaceConfig'
        session:
          $ref: '#/components/schemas/SessionConfig'
        tools:
          $ref: '#/components/schemas/ToolsConfig'
        channels:
          $ref: '#/components/schemas/ChannelsConfig'

    ProviderConfig:
      type: object
      description: Constructor settings for the AI SDK provider. The selected provider entry must exist and include its `apiKey`. Secret-like fields are encrypted at rest and redacted from reads.
      properties:
        google:
          type: object
          description: Google Generative AI provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            headers:
              type: object
        openai:
          type: object
          description: OpenAI provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            organization:
              type: string
            project:
              type: string
            name:
              type: string
        bedrock:
          type: object
          description: AWS Bedrock provider
          properties:
            region:
              type: string
            apiKey:
              type: string
            accessKeyId:
              type: string
            secretAccessKey:
              type: string
            sessionToken:
              type: string
        gateway:
          type: object
          description: Gateway provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            headers:
              type: object
        minimax:
          type: object
          description: MiniMax provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            headers:
              type: object

    ModelConfig:
      type: object
      description: Controls the Vercel AI SDK `streamText` call. All standard `streamText` parameters pass through directly. The `options` field maps to `providerOptions`.
      properties:
        provider:
          type: string
          description: Provider constructor key matching `provider` config
        modelId:
          type: string
          description: Provider-specific model identifier
        temperature:
          type: number
        maxOutputTokens:
          type: integer
        topP:
          type: number
        topK:
          type: integer
        stopSequences:
          type: array
          items:
            type: string
        headers:
          type: object
        timeout:
          type: integer
          description: Request timeout in seconds
        output:
          $ref: '#/components/schemas/OutputConfig'
        options:
          type: object
          description: Provider-specific `providerOptions`

    OutputConfig:
      type: object
      description: Structured output config. JSON-only so it can be stored in encrypted agent config. Use JSON Schema rather than Zod.
      properties:
        type:
          type: string
          enum: [text, object, array, choice, json]
        name:
          type: string
        description:
          type: string
        schema:
          type: object
          description: JSON Schema for `object` type
        element:
          type: object
          description: JSON Schema for `array` element type
        options:
          type: array
          items:
            type: string
          description: String options for `choice` type

    AgentRuntimeConfig:
      type: object
      description: Controls harness behavior. The runtime always prepends an environment system prompt (current time, timezone) before this agent prompt.
      properties:
        maxTurn:
          type: integer
          description: Maximum model/tool loop steps per conversation turn
        system:
          type: string
          description: Replaces the generated default system prompt. Do not duplicate current-time instructions.

    HooksConfig:
      type: object
      description: Lifecycle hooks publish stable agent runtime events. Delivery is best-effort.
      properties:
        webhook:
          type: object
          properties:
            enabled:
              type: boolean
            url:
              type: string
              description: HTTPS endpoint for event JSON
            secret:
              type: string
              description: HMAC signing secret for `X-Webhook-Signature`
            events:
              type: array
              items:
                type: string
              description: Optional allow-list; omitted means all events

    SkillsConfig:
      type: object
      description: When enabled, the runtime includes allowed skill metadata in the system prompt and exposes the `load_skill` tool.
      properties:
        enabled:
          type: boolean
        allowed:
          type: array
          items:
            type: string
          description: Account-scoped skill paths (e.g., `acct_.../support-flow`)

    SubagentConfig:
      type: object
      description: When enabled, the runtime exposes `run_subagent` and adds predefined subagent metadata to the parent prompt.
      properties:
        enabled:
          type: boolean
        allowed:
          type: array
          items:
            type: string
          description: Predefined same-account agent ids; empty means virtual subagents only
        context:
          type: string
          enum: [new, inherited]
          description: Default child context mode; omitted means `new`
        mode:
          type: string
          enum: [ephemeral, persistent]
          description: Child conversation persistence mode; omitted means `ephemeral`

    WorkspaceConfig:
      type: object
      description: Enables workspace-backed features including `MEMORY.md`, filesystem, sandbox execution, and tasks.
      properties:
        enabled:
          type: boolean
        needsApproval:
          type: boolean
          description: Requires AI SDK approval before every workspace tool execution
        memory:
          type: object
          properties:
            enabled:
              type: boolean
            namespace:
              type: string
              description: Session namespace key; `null` means per-conversation state
        sandbox:
          type: object
          description: File-only `node` and `python` execution from the filesystem tool
          properties:
            enabled:
              type: boolean
            provider:
              type: string
              enum: [lambda, e2b, daytona]
            timeout:
              type: integer
              description: "Per-run timeout in seconds (1–120, default: 30)"
            outputLimitBytes:
              type: integer
              description: "Captured stdout/stderr limit (1–262144, default: 65536)"
        tasks:
          type: object
          properties:
            enabled:
              type: boolean

    SessionConfig:
      type: object
      description: Controls model-visible history management.
      properties:
        pruning:
          type: object
          properties:
            enabled:
              type: boolean
              description: "Automatic history pruning (default: `true`)"
        compaction:
          type: object
          properties:
            enabled:
              type: boolean
              description: "Context compaction (default: `false`)"
            maxContextLength:
              type: integer
              description: Serialized character-length threshold

    ToolsConfig:
      type: object
      description: "Enables external tools. Keys must match available tool names. Omitting or `enabled: false` disables the tool."
      properties:
        tavilySearch:
          $ref: '#/components/schemas/TavilySearchConfig'
        tavilyExtract:
          $ref: '#/components/schemas/TavilyExtractConfig'
        googleSearch:
          $ref: '#/components/schemas/GoogleSearchConfig'
        test_async:
          $ref: '#/components/schemas/TestAsyncConfig'
        test_external_async:
          $ref: '#/components/schemas/TestExternalAsyncConfig'

    TavilySearchConfig:
      type: object
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        execution:
          type: string
          enum: [same-invocation, external-dispatch]
        needsApproval:
          type: boolean
        apiKey:
          type: string
        searchDepth:
          type: string
          enum: [basic, advanced]
        includeAnswer:
          type: boolean
        maxResults:
          type: integer
          description: "1–20, default: 5"
        topic:
          type: string
          enum: [general, news, finance]

    TavilyExtractConfig:
      type: object
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        execution:
          type: string
          enum: [same-invocation, external-dispatch]
        needsApproval:
          type: boolean
        apiKey:
          type: string
        extractDepth:
          type: string
          enum: [basic, advanced]
        format:
          type: string
          enum: [markdown, text]

    GoogleSearchConfig:
      type: object
      description: Requires `config.model.provider` to be `google`. Provider-defined tools cannot use async wrapping.
      properties:
        enabled:
          type: boolean
        needsApproval:
          type: boolean
        searchTypes:
          type: object
          description: "Keys: `webSearch`, `imageSearch`"
        timeRangeFilter:
          type: object
          properties:
            startTime:
              type: string
              description: ISO date string
            endTime:
              type: string
              description: ISO date string

    TestAsyncConfig:
      type: object
      description: Local async example tool for testing
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        execution:
          type: string
          enum: [same-invocation, external-dispatch]
        needsApproval:
          type: boolean

    TestExternalAsyncConfig:
      type: object
      description: External-dispatch mock tool fixture for testing
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        execution:
          type: string
          enum: [external-dispatch]
        completionBaseUrl:
          type: string
          description: Harness `AGENT_SERVICE_URL` for callback URL
        completionBearerToken:
          type: string
          description: Account bearer token for mock worker callback

    ChannelsConfig:
      type: object
      description: Channel webhook configuration. Webhook URLs follow the pattern `/webhooks/{accountId}/{agentId}/{channel}`.
      properties:
        telegram:
          type: object
          properties:
            botToken:
              type: string
            webhookSecret:
              type: string
            allowedChatIds:
              type: array
              items:
                type: integer
            reactionEmoji:
              type: string
        github:
          type: object
          properties:
            webhookSecret:
              type: string
            appId:
              type: string
            privateKey:
              type: string
              description: GitHub App private key (PEM)
            allowedRepos:
              type: array
              items:
                type: string
              description: Repository slugs (`owner/repo`)
        slack:
          type: object
          properties:
            botToken:
              type: string
            signingSecret:
              type: string
            allowedChannelIds:
              type: array
              items:
                type: string
        discord:
          type: object
          properties:
            botToken:
              type: string
            publicKey:
              type: string
            allowedGuildIds:
              type: array
              items:
                type: string
        pancake:
          type: object
          description: Page-validated (no signature header). Keep webhook URL private.
          properties:
            pageId:
              type: string
            pageAccessToken:
              type: string
            senderId:
              type: string
              description: Optional staff user ID for replies
            options:
              type: object
              description: Optional Pancake adapter settings.
              properties:
                handoff:
                  type: object
                  description: Skips conversations that include the configured Pancake handoff tag.
                  properties:
                    tagId:
                      type: string
                      description: Pancake conversation tag ID for human handoff.
                    assigneeIds:
                      type: array
                      items:
                        type: string
                      description: Optional staff IDs used by handoff tooling.
