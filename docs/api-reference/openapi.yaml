openapi: 3.1.0
info:
  title: BeeBlast API Reference
  description: |
    Complete API reference for BeeBlast. Two surfaces:

    - **Direct API** — account-authenticated agent runtime endpoint (sync SSE, async jobs, status polling, external tool completion)
    - **Account Management** — tenant configuration (accounts, agents, skills, secrets)
  version: 1.0.0

servers:
  - url: https://{functionUrl}.lambda-url.{region}.on.aws
    description: Deployed Function URL
    variables:
      functionUrl:
        default: your-function-url
        description: Your deployed Function URL ID
      region:
        default: us-east-1
        description: AWS deployment region

security:
  - BearerAuth: []

tags:
  - name: Direct API
    description: Agent runtime for sync SSE, async jobs, status polling, and external tool completion.
  - name: Accounts
    description: Account lifecycle, metadata, and secret rotation.
  - name: Agents
    description: Account-owned agent configuration.
  - name: Skills
    description: Account-owned skill package management.

paths:
  /:
    get:
      tags:
        - Direct API
      summary: Health probe
      description: Unauthenticated lightweight probe for the deployed harness-processing Function URL.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  method:
                    type: string
                    example: POST

    post:
      tags:
        - Direct API
      summary: Sync direct API (SSE)
      description: |
        Run a synchronous direct agent turn. Returns an SSE stream with Vercel AI SDK stream events.

        When the selected agent config has `model.output`, the stream emits a final `structured-output` event with the parsed JSON value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectApiRequest'
      responses:
        '200':
          description: SSE stream of agent execution
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Direct API disabled (ENABLE_DIRECT_API=false)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /async:
    post:
      tags:
        - Direct API
      summary: Async direct API
      description: |
        Queue an async direct agent turn. Returns immediately with a status URL for polling.
        The async worker runs the same account-scoped harness code in the background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectApiRequest'
      responses:
        '200':
          description: Async job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusUrl:
                    type: string
                    format: uri
                    description: URL to poll for job status
                    example: https://your-function-url.lambda-url.us-east-1.on.aws/status/unique-id-for-dedup?agentId=agent_abc123
        '404':
          description: Direct API disabled (ENABLE_DIRECT_API=false)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /status/{eventId}:
    get:
      tags:
        - Direct API
      summary: Poll async status
      description: |
        Poll the status of an async job. Responses are backed by the account-scoped AsyncAgentResult DynamoDB record.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
          description: Unique event ID from the async submission
        - name: agentId
          in: query
          required: true
          schema:
            type: string
          description: Agent ID to scope the status lookup
      responses:
        '200':
          description: Current job status
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StatusProcessing'
                  - $ref: '#/components/schemas/StatusAwaitingApproval'
                  - $ref: '#/components/schemas/StatusCompleted'
                  - $ref: '#/components/schemas/StatusFailed'
        '404':
          description: Unknown event ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventId:
                    type: string
                  status:
                    type: string
                    example: not_found
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /async-tools/{resultId}/complete:
    post:
      tags:
        - Direct API
      summary: Complete external async tool
      description: |
        Complete an externally dispatched async tool. Completion settles one AsyncToolResult row.
        A sealed dispatch-group item waits for every sibling result before continuing the parent.
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
          description: Async tool result ID from the waiting event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ToolCompletionSuccess'
                - $ref: '#/components/schemas/ToolCompletionFailure'
      responses:
        '200':
          description: Tool result settled
        '202':
          description: Waiting for more async tools in dispatch group
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: waiting_for_async_tools
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /accounts:
    post:
      tags:
        - Accounts
      summary: Create account
      description: Public endpoint to create a new account. IP-rate-limited.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  description: Required human-readable account name
                  example: company-a
                description:
                  type: string
                  description: Optional purpose or usage note
                  example: Company A account
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  accountSecret:
                    type: string
                    description: One-time API secret. Store securely; not recoverable.
                    example: fp_acct_...
        '429':
          description: Rate limited

    get:
      tags:
        - Accounts
      summary: List all accounts (admin)
      description: Admin-only endpoint to list all accounts.
      security:
        - AdminAuth: []
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'

  /accounts/{accountId}:
    get:
      tags:
        - Accounts
      summary: Get account (admin)
      description: Admin-only endpoint to retrieve a specific account.
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    patch:
      tags:
        - Accounts
      summary: Update account (admin)
      description: Admin-only endpoint to update account metadata.
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    delete:
      tags:
        - Accounts
      summary: Delete account (admin)
      description: Admin-only endpoint to delete an account and cascade cleanup all account-scoped data.
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'

  /accounts/{accountId}/rotate-secret:
    post:
      tags:
        - Accounts
      summary: Rotate account secret (admin)
      description: Admin-only endpoint to rotate an account secret.
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountSecret:
                    type: string
                    description: New one-time API secret
                    example: fp_acct_...

  /accounts/me:
    get:
      tags:
        - Accounts
      summary: Get own account
      description: Retrieve the authenticated account's metadata.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    patch:
      tags:
        - Accounts
      summary: Update own account
      description: Update the authenticated account's metadata. Only accepts account metadata fields.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

    delete:
      tags:
        - Accounts
      summary: Delete own account
      description: Delete the authenticated account and cascade cleanup all account-scoped data.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'

  /accounts/me/rotate-secret:
    post:
      tags:
        - Accounts
      summary: Rotate own secret
      description: Rotate the authenticated account's secret.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accountSecret:
                    type: string
                    description: New one-time API secret
                    example: fp_acct_...

  /accounts/me/agents:
    post:
      tags:
        - Agents
      summary: Create agent
      description: Create a new agent under the authenticated account.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: Agent name
                  example: support-agent
                description:
                  type: string
                  description: Agent description; visible to parent agents when allowed as subagent
                  example: Customer support agent
                config:
                  $ref: '#/components/schemas/AgentConfig'
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: '#/components/schemas/Agent'

    get:
      tags:
        - Agents
      summary: List agents
      description: List all agents under the authenticated account.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'

  /accounts/me/agents/{agentId}:
    get:
      tags:
        - Agents
      summary: Get agent
      description: Retrieve a specific agent's metadata and config.
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    patch:
      tags:
        - Agents
      summary: Update agent
      description: Update an agent's metadata and config. Config patch is a deep merge.
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                config:
                  $ref: '#/components/schemas/AgentConfig'
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    delete:
      tags:
        - Agents
      summary: Delete agent
      description: Delete a specific agent.
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent deleted

  /accounts/me/skills:
    post:
      tags:
        - Skills
      summary: Create skill
      description: Upload a new skill under the authenticated account.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
                - name
                - description
              properties:
                source:
                  type: string
                  enum: [json, base64, github]
                  description: Skill source type
                name:
                  type: string
                  description: Skill name
                  example: support-flow
                description:
                  type: string
                  description: Skill description
                  example: Handles support triage
                content:
                  type: string
                  description: Skill content (for json source)
      responses:
        '201':
          description: Skill created
          content:
            application/json:
              schema:
                type: object
                properties:
                  skill:
                    $ref: '#/components/schemas/Skill'

    get:
      tags:
        - Skills
      summary: List skills
      description: List all skills under the authenticated account.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Skill'

  /accounts/me/skills/{skillName}:
    get:
      tags:
        - Skills
      summary: Get skill
      description: Retrieve a specific skill.
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

    put:
      tags:
        - Skills
      summary: Update skill
      description: Update a specific skill.
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  type: string
                content:
                  type: string
      responses:
        '200':
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

    delete:
      tags:
        - Skills
      summary: Delete skill
      description: Delete a specific skill.
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill deleted

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Account secret obtained from account creation or rotation
    AdminAuth:
      type: http
      scheme: bearer
      description: AdminAccountSecret from SST secrets

  schemas:
    DirectApiRequest:
      type: object
      required:
        - agentId
        - eventId
        - events
      properties:
        agentId:
          type: string
          description: Selects the account-owned agent config to run
          example: agent_abc123
        eventId:
          type: string
          description: Used for account-scoped deduplication
          example: unique-id-for-dedup
        conversationKey:
          type: string
          description: Selects the account-scoped persisted direct conversation
          example: conversation-identifier
        events:
          type: array
          description: Vercel AI SDK-style messages
          items:
            $ref: '#/components/schemas/Message'

    Message:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, system, tool]
          description: "Message role. `system` events must use `persist: false` and are only supported on the direct API path."
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ContentBlock'
        persist:
          type: boolean
          description: Must be `false` for system events. System events are request-local and not stored in DynamoDB.

    ContentBlock:
      type: object
      discriminator:
        propertyName: type
      oneOf:
        - $ref: '#/components/schemas/TextContent'
        - $ref: '#/components/schemas/ToolApprovalResponse'

    TextContent:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          example: text
        text:
          type: string
          example: Hello

    ToolApprovalResponse:
      type: object
      required:
        - type
        - approvalId
        - approved
      properties:
        type:
          type: string
          example: tool-approval-response
        approvalId:
          type: string
          description: Required to match the decision to the pending tool call
        approved:
          type: boolean
          description: Set to false to deny the tool execution
        reason:
          type: string
          description: Reason for approval or denial

    StatusProcessing:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
          example: processing

    StatusAwaitingApproval:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
          example: awaiting_approval
        approvals:
          type: array
          items:
            type: object
            properties:
              approvalId:
                type: string
              toolCallId:
                type: string
              toolName:
                type: string
                example: filesystem
              input:
                type: object

    StatusCompleted:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
          example: completed
        response:
          type: object

    StatusFailed:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
          example: failed
        error:
          type: string
          description: Failure details

    ToolCompletionSuccess:
      type: object
      required:
        - status
        - response
      properties:
        status:
          type: string
          example: completed
        response:
          type: object
          description: Tool execution result

    ToolCompletionFailure:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: string
          example: failed
        error:
          type: string
          description: Error message

    Error:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized

    Account:
      type: object
      properties:
        accountId:
          type: string
          description: Generated stable identifier
          example: acct_...
        username:
          type: string
          description: Human-readable account name
          example: company-a
        description:
          type: string
          description: Purpose or usage note
          example: Company A account

    Agent:
      type: object
      properties:
        accountId:
          type: string
          example: acct_...
        agentId:
          type: string
          example: agent_...
        name:
          type: string
          example: support-agent
        description:
          type: string
          example: Customer support agent

    Skill:
      type: object
      properties:
        skillPath:
          type: string
          description: Account-scoped skill path
          example: acct_.../support-flow
        name:
          type: string
          example: support-flow
        description:
          type: string
          example: Handles support triage

    DeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
          example: true
        cleanup:
          type: object
          properties:
            conversationsDeleted:
              type: integer
            processedEventsDeleted:
              type: integer
            asyncAgentResultDeleted:
              type: integer
            asyncToolResultDeleted:
              type: integer
            filesystemObjectsDeleted:
              type: integer
            agentsDeleted:
              type: integer
            skillObjectsDeleted:
              type: integer

    AgentConfig:
      type: object
      description: Agent runtime configuration. See account-management.md for full field reference.
      properties:
        provider:
          type: object
          description: Provider constructor settings
        model:
          type: object
          description: Vercel AI SDK streamText settings
        agent:
          type: object
          description: Agent runtime behavior
          properties:
            maxTurn:
              type: integer
            system:
              type: string
        hooks:
          type: object
          description: Lifecycle hooks configuration
        skills:
          type: object
          description: Skills configuration
          properties:
            enabled:
              type: boolean
            allowed:
              type: array
              items:
                type: string
        subagent:
          type: object
          description: Subagent dispatch configuration
          properties:
            enabled:
              type: boolean
            allowed:
              type: array
              items:
                type: string
            context:
              type: string
              enum: [new, inherited]
        workspace:
          type: object
          description: Workspace-backed features configuration
          properties:
            enabled:
              type: boolean
            needsApproval:
              type: boolean
            memory:
              type: object
              properties:
                enabled:
                  type: boolean
                namespace:
                  type: string
            sandbox:
              type: object
              properties:
                enabled:
                  type: boolean
                provider:
                  type: string
                  enum: [lambda, e2b, daytona]
                timeout:
                  type: integer
                memoryLimit:
                  type: integer
                outputLimitBytes:
                  type: integer
                dependencies:
                  type: object
                  properties:
                    npm:
                      type: array
                      items:
                        type: string
                    pip:
                      type: array
                      items:
                        type: string
            tasks:
              type: object
              properties:
                enabled:
                  type: boolean
        session:
          type: object
          description: Session history management
          properties:
            pruning:
              type: object
              properties:
                enabled:
                  type: boolean
            compaction:
              type: object
              properties:
                enabled:
                  type: boolean
                maxContextLength:
                  type: integer
        tools:
          type: object
          description: External tools configuration
        channels:
          type: object
          description: Channel webhook configuration
