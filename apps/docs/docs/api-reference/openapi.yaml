openapi: 3.1.0
info:
  title: Broods API Reference
  description: |
    Complete API reference for Broods. Two surfaces:

    - **Direct API** — account-authenticated agent runtime endpoint (sync SSE, async jobs, status polling, external tool completion)
    - **Account Management** — tenant configuration (accounts, agents, skills, secrets)

    > **For daily development, use the `broods` CLI and TypeScript SDK.** The CLI handles tenant configuration (agents, sandboxes, workspaces, skills, crons, tools) automatically via `broods dev` and `broods deploy`. You do not need to call these account-management endpoints manually. This reference is for:
    > - Runtime invocation (`/`, `/async`, `/status/{eventId}`) from the TypeScript SDK, curl, or Python client
    > - Advanced integrations that need direct account-management access
    > - Admin operations using `AdminAccountSecret`

    Every `/accounts/me/...` sub-resource (agents, skills, crons, tools, sandboxes, workspaces, rotate-secret) is also reachable by admins as `/accounts/{accountId}/...` with the `AdminAccountSecret` bearer token; behavior and shapes are identical.
  version: 0.1.0

servers:
  - url: https://{functionUrl}.lambda-url.{region}.on.aws
    description: Deployed Function URL
    variables:
      functionUrl:
        default: your-function-url
        description: Your deployed Function URL ID
      region:
        default: eu-west-1
        description: AWS deployment region

security:
  - BearerAuth: []

tags:
  - name: Direct API
    description: Agent runtime for sync SSE, async jobs, status polling, and external tool completion.
  - name: Accounts
    description: Account lifecycle, metadata, and secret rotation.
  - name: Agents
    description: Account-owned agent configuration.
  - name: Skills
    description: Account-owned skill package management.
  - name: Cron Jobs
    description: Account-owned scheduled agent runs.
  - name: Sandboxes
    description: Account-owned sandbox execution configs.
  - name: Workspaces
    description: Account-owned workspace configs.
  - name: Tools
    description: Account-uploaded custom tool bundles.

paths:
  /:
    get:
      tags:
        - Direct API
      summary: Health probe
      description: Unauthenticated lightweight probe for the deployed harness-processing Function URL.
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  method:
                    type: string
                    example: POST
              examples:
                healthy:
                  value:
                    status: ok
                    method: POST

    post:
      tags:
        - Direct API
      summary: Sync direct API (SSE)
      description: |
        Run a synchronous direct agent turn. Returns an SSE stream with Vercel AI SDK stream events.

        The SSE stream uses the [Vercel AI SDK wire protocol](https://sdk.vercel.ai/docs/ai-sdk-core/streaming#data-stream-protocol). Common event types include `step-start`, `text`, `tool-call`, `tool-result`, `tool-approval-request`, `step-finish`, and `finish`. When `model.output` is configured, a final `structured-output` event carries the parsed JSON value.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectApiRequest'
            examples:
              basic:
                summary: Basic request
                value:
                  agentId: agent_abc123
                  eventId: unique-id-for-dedup
                  conversationKey: conversation-identifier
                  events:
                    - role: user
                      content:
                        - type: text
                          text: Hello
              withSystem:
                summary: With ephemeral system event
                value:
                  agentId: agent_abc123
                  eventId: unique-id-for-dedup
                  conversationKey: conversation-identifier
                  events:
                    - role: system
                      content: The next answer should be terse.
                      persist: false
                    - role: user
                      content:
                        - type: text
                          text: What is the capital of France?
              withOverrides:
                summary: With per-run overrides (top-level system and model)
                value:
                  agentId: agent_abc123
                  eventId: unique-id-for-dedup
                  conversationKey: conversation-identifier
                  system:
                    - role: system
                      content: Answer concisely.
                      persist: false
                  model:
                    temperature: 0.3
                    providerOptions:
                      openai:
                        reasoningEffort: high
                        reasoningSummary: auto
                  events:
                    - role: user
                      content:
                        - type: text
                          text: Summarize today's plan.
      responses:
        '200':
          description: SSE stream of agent execution
          content:
            text/event-stream:
              schema:
                type: string
                format: binary
              examples:
                streamEvents:
                  summary: Common SSE events
                  value: |
                    event: 0
                    data: {"type":"step-start","messageId":"msg_123"}

                    event: 0
                    data: {"type":"text","text":"Hello"}

                    event: 0
                    data: {"type":"tool-call","toolCallId":"tc_1","toolName":"bash","input":{"shell":"ls"}}

                    event: 0
                    data: {"type":"tool-result","toolCallId":"tc_1","toolName":"bash","output":"file.txt"}

                    event: 0
                    data: {"type":"step-finish","finishReason":"stop","usage":{"promptTokens":100,"completionTokens":50}}

                    event: 0
                    data: {"type":"finish","finishReason":"stop"}
        '403':
          description: Agent has not opted into public access (secure by default)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                publicAccessDisabled:
                  value:
                    error: "Agent agent_... is not publicly accessible. Enable public access (publicAccess: true) and redeploy, or reach it through an internal endpoint or channel webhook."
                    code: public_access_disabled
        '404':
          description: Direct API disabled (ENABLE_DIRECT_API=false)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /async:
    post:
      tags:
        - Direct API
      summary: Async direct API
      description: Queue an async direct agent turn. Returns immediately with a status URL for polling. The async worker runs the same account-scoped harness code in the background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectApiRequest'
            examples:
              basic:
                summary: Basic async request
                value:
                  agentId: agent_abc123
                  eventId: async-unique-id
                  conversationKey: conversation-identifier
                  events:
                    - role: user
                      content:
                        - type: text
                          text: Generate a summary of today's news
      responses:
        '202':
          description: Async job accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusUrl:
                    type: string
                    format: uri
              examples:
                accepted:
                  value:
                    statusUrl: https://your-function-url.lambda-url.eu-west-1.on.aws/status/async-unique-id?agentId=agent_abc123
        '403':
          description: Agent has not opted into public access (secure by default)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                publicAccessDisabled:
                  value:
                    error: "Agent agent_... is not publicly accessible. Enable public access (publicAccess: true) and redeploy, or reach it through an internal endpoint or channel webhook."
                    code: public_access_disabled
        '404':
          description: Direct API disabled (ENABLE_DIRECT_API=false)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /status/{eventId}:
    get:
      tags:
        - Direct API
      summary: Poll async status
      description: Poll the status of an async job. Responses are backed by the account-scoped `AsyncAgentResult` DynamoDB record.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
        - name: agentId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current job status
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StatusProcessing'
                  - $ref: '#/components/schemas/StatusAwaitingApproval'
                  - $ref: '#/components/schemas/StatusCompleted'
                  - $ref: '#/components/schemas/StatusFailed'
              examples:
                processing:
                  summary: Job still running
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: processing
                awaitingApproval:
                  summary: Tool approval needed
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: awaiting_approval
                    approvals:
                      - approvalId: approval-123
                        toolCallId: tool-call-456
                        toolName: bash
                        input:
                          shell: rm file.txt
                completed:
                  summary: Job finished
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: completed
                    response:
                      answer: done
                failed:
                  summary: Job failed
                  value:
                    eventId: unique-id-for-dedup
                    conversationKey: conversation-identifier
                    status: failed
                    error: Model provider returned 503
        '404':
          description: Unknown event ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  eventId:
                    type: string
                  status:
                    type: string
              examples:
                notFound:
                  value:
                    eventId: unknown-id
                    status: not_found
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /async-tools/{resultId}/complete:
    post:
      tags:
        - Direct API
      summary: Complete async tool callback
      description: Compatibility callback for settling one `AsyncToolResult` row through account bearer auth. Platform-managed sandbox jobs use `/sandbox-jobs/{resultId}/complete` with a per-result token.
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ToolCompletionSuccess'
                - $ref: '#/components/schemas/ToolCompletionFailure'
            examples:
              success:
                summary: Tool completed
                value:
                  status: completed
                  response:
                    answer: done
                    data:
                      - 1
                      - 2
                      - 3
              failure:
                summary: Tool failed
                value:
                  status: failed
                  error: External service timeout after 30s
      responses:
        '202':
          description: "Result accepted (`status: accepted` when settled, `status: waiting_for_async_tools` with `pendingCount` while siblings are outstanding)"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  pendingCount:
                    type: integer
              examples:
                accepted:
                  value:
                    status: accepted
                waiting:
                  value:
                    status: waiting_for_async_tools
                    pendingCount: 2
        '404':
          description: Unknown resultId
        '409':
          description: Result already settled
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  value:
                    error: Unauthorized

  /sandbox-jobs/{resultId}/complete:
    post:
      tags:
        - Direct API
      summary: Complete sandbox job callback
      description: Token-authenticated completion callback used by detached sandbox background jobs and detached uploaded tools. Authenticated with the per-job `x-job-token` header minted at launch, not an account secret. Unknown ids and bad tokens both return 404.
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
        - name: x-job-token
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/ToolCompletionSuccess'
                - $ref: '#/components/schemas/ToolCompletionFailure'
      responses:
        '202':
          description: Result accepted
        '404':
          description: Unknown resultId or invalid token

  /webhooks/{accountId}/{agentId}/{channelName}:
    post:
      tags:
        - Direct API
      summary: Channel provider webhook
      description: Ingress for provider webhooks (telegram, github, slack, discord, pancake, zalo). Authentication is provider-native (signature or secret) per channel; the response shape is channel-specific. See the Channels documentation.
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: channelName
          in: path
          required: true
          schema:
            type: string
            enum: [telegram, github, slack, discord, pancake, zalo]
      responses:
        '200':
          description: Provider-specific acknowledgement
        '401':
          description: Provider authentication failed
        '404':
          description: Unknown account, agent, or channel

  /accounts:
    post:
      tags:
        - Accounts
      summary: Create account
      description: Public endpoint to create a new account. IP-rate-limited. Store `secret` securely — it is not recoverable.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
              properties:
                username:
                  type: string
                  description: Required human-readable account name
                description:
                  type: string
                  description: Optional purpose or usage note
            examples:
              basic:
                value:
                  username: company-a
              withDescription:
                value:
                  username: company-a
                  description: Company A account
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  secret:
                    type: string
              examples:
                created:
                  value:
                    account:
                      accountId: acct_abc123
                      username: company-a
                      description: Company A account
                    secret: fp_acct_xyz789...
        '429':
          description: Rate limited

    get:
      tags:
        - Accounts
      summary: List all accounts (admin)
      description: Admin-only endpoint. Requires `AdminAccountSecret` from SST secrets.
      security:
        - AdminAuth: []
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
              examples:
                list:
                  value:
                    accounts:
                      - accountId: acct_abc123
                        username: company-a
                        description: Company A account
                      - accountId: acct_def456
                        username: company-b
                        description: Company B account

  /accounts/{accountId}:
    get:
      tags:
        - Accounts
      summary: Get account (admin)
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'

    patch:
      tags:
        - Accounts
      summary: Update account (admin)
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'

    delete:
      tags:
        - Accounts
      summary: Delete account (admin)
      description: Deletes the account and cascades cleanup for all account-scoped data (conversations, agents, skills, filesystem objects, async results).
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              examples:
                deleted:
                  value:
                    deleted: true
                    cleanup:
                      conversationsDeleted: 12
                      processedEventsDeleted: 14
                      asyncAgentResultDeleted: 2
                      asyncToolResultDeleted: 3
                      filesystemObjectsDeleted: 8
                      agentsDeleted: 1
                      skillObjectsDeleted: 4

  /accounts/{accountId}/rotate-secret:
    post:
      tags:
        - Accounts
      summary: Rotate account secret (admin)
      security:
        - AdminAuth: []
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  secret:
                    type: string
              examples:
                rotated:
                  value:
                    account:
                      accountId: acct_abc123
                      username: company-a
                    secret: fp_acct_new...

  /accounts/me:
    get:
      tags:
        - Accounts
      summary: Get own account
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'

    patch:
      tags:
        - Accounts
      summary: Update own account
      description: Update account metadata only. Runtime config is managed through agent endpoints.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                description:
                  type: string
            examples:
              updateDescription:
                value:
                  description: Updated account purpose
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
              examples:
                updated:
                  value:
                    accountId: acct_abc123
                    username: company-a
                    description: Updated account purpose

    delete:
      tags:
        - Accounts
      summary: Delete own account
      description: Deletes the authenticated account and cascades cleanup for all account-scoped data.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'

  /accounts/me/rotate-secret:
    post:
      tags:
        - Accounts
      summary: Rotate own secret
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Secret rotated
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: '#/components/schemas/Account'
                  secret:
                    type: string
              examples:
                rotated:
                  value:
                    account:
                      accountId: acct_abc123
                      username: company-a
                    secret: fp_acct_new...

  /accounts/me/agents:
    post:
      tags:
        - Agents
      summary: Create agent
      description: Create a new agent under the authenticated account. The `agentId` in the response is required for all runtime requests.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Visible to parent agents when allowed as subagent
                config:
                  $ref: '#/components/schemas/AgentConfig'
            examples:
              basic:
                summary: Minimal agent
                value:
                  name: support-agent
                  description: Customer support agent
                  config:
                    provider:
                      google:
                        apiKey: your-api-key
                    model:
                      provider: google
                      modelId: gemini-3-flash
                    agent:
                      system: You are a helpful support assistant.
              withWorkspace:
                summary: Agent referencing a sandbox + workspace and tools
                value:
                  name: research-agent
                  description: Research assistant with web search
                  config:
                    provider:
                      google:
                        apiKey: your-api-key
                    model:
                      provider: google
                      modelId: gemini-3-flash
                      temperature: 0.2
                    agent:
                      system: You are a research assistant. Always cite sources.
                    sandbox: sb_xxx
                    workspaces:
                      - name: notes
                        workspaceId: ws_aaa
                    tools:
                      tavilySearch:
                        enabled: true
                        apiKey: your-tavily-key
                        searchDepth: advanced
      responses:
        '201':
          description: Agent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
              examples:
                created:
                  value:
                    accountId: acct_abc123
                    agentId: agent_xyz789
                    name: support-agent
                    description: Customer support agent

    get:
      tags:
        - Agents
      summary: List agents
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: '#/components/schemas/Agent'

  /accounts/me/agents/{agentId}:
    get:
      tags:
        - Agents
      summary: Get agent
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    patch:
      tags:
        - Agents
      summary: Update agent
      description: Config patch is a deep merge. Redacted secret placeholders (`********`) preserve existing secrets. Set a field to `null` to delete it.
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                config:
                  $ref: '#/components/schemas/AgentConfig'
      responses:
        '200':
          description: Agent updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    delete:
      tags:
        - Agents
      summary: Delete agent
      security:
        - BearerAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Agent deleted

  /accounts/me/sandboxes:
    post:
      tags:
        - Sandboxes
      summary: Create sandbox
      description: Create a standalone, account-scoped sandbox config. Reference its `sandboxId` from an agent config via `sandbox`. Config is encrypted at rest (it may carry `envVars`).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                config:
                  type: object
                  properties:
                    provider: { type: string, enum: [sandbox, lambda, e2b, daytona, vercel] }
                    network:
                      type: object
                      description: "Egress policy. Defaults to deny-all when omitted."
                      properties:
                        mode: { type: string, enum: [allow-all, deny-all, restricted] }
                        allowDomains:
                          type: array
                          description: "Allowed domains when mode is restricted and the provider supports domain rules."
                          items: { type: string }
                        allowCidrs:
                          type: array
                          description: "Allowed CIDR ranges when mode is restricted and the provider supports CIDR rules."
                          items: { type: string }
                    permissionMode: { type: string, enum: [edit, ask, bypass] }
                    size: { type: string, enum: [tiny, xsmall, small, medium, large], description: "Predefined compute size (vcpu/memory/disk). Drives workdir create-time resources and the dashboard's instance specs; advisory on providers that size natively (MicroVM bakes size into the image; daytona/e2b/vercel size themselves). Defaults to the provider's own default when unset. Free tier: tiny + xsmall." }
                    snapshot: { type: string, description: "Prebuilt image/snapshot to launch from: a workdir image id/name or a MicroVM image ARN. Unset boots the provider's default base image. Consumed by the self-hosted backends (sandbox/lambda); advisory on daytona/e2b/vercel, which pick images via their own options. The launched-from id is mirrored onto the dashboard instance row." }
                    persistent: { type: boolean, description: "Reserve one long-lived sandbox per workspace (reconnect across calls, background jobs, packages persist). For lambda this reserves a snapshot-resumable MicroVM (suspend/resume on idle, 8h max)." }
                    lifecycle:
                      type: object
                      description: "Idle/expiry policy when persistent. Requires persistent: true."
                      properties:
                        idleTimeoutSeconds: { type: integer, description: "scale down / stop after this idle (default 900)" }
                        maxLifetimeSeconds: { type: integer, description: "hard-expiry backstop from creation (default 7 days)" }
                    onCreate:
                      type: array
                      description: "Persistent-only shell commands run once on first create."
                      items: { type: string }
                    onResume:
                      type: array
                      description: "Persistent-only shell commands run on every resume/acquire."
                      items: { type: string }
                    runtimes:
                      type: array
                      items: { type: string, enum: [bash, python, node] }
                    timeout: { type: integer, description: "per-call seconds (max 600 for every provider)" }
                    memoryLimit: { type: integer, description: "MB; bounded for lambda MicroVM (max 8192), operator-sized for other providers" }
                    outputLimitBytes: { type: integer }
                    envVars: { type: object, additionalProperties: { type: string } }
                    options: { type: object, description: "Provider-specific knobs (e.g. mountAwsS3Buckets, workspaceRoot)." }
            examples:
              lambda:
                value:
                  name: default
                  config: { provider: lambda, network: { mode: allow-all }, permissionMode: ask }
              persistentSandbox:
                value:
                  name: reserved
                  config:
                    provider: sandbox
                    size: small
                    snapshot: img_curated_python
                    network: { mode: allow-all }
                    persistent: true
                    permissionMode: bypass
                    lifecycle: { idleTimeoutSeconds: 1800 }
                    options: { mountAwsS3Buckets: true }
              vercel:
                value:
                  name: vercel
                  config:
                    provider: vercel
                    network: { mode: restricted, allowDomains: [api.example.com], allowCidrs: [10.0.0.0/8] }
                    persistent: true
                    permissionMode: bypass
                    onCreate: ["npm install"]
      responses:
        '201': { description: Sandbox created }
    get:
      tags: [Sandboxes]
      summary: List sandboxes
      security:
        - BearerAuth: []
      responses:
        '200': { description: List of sandboxes }

  /accounts/me/sandboxes/{sandboxId}:
    get:
      tags: [Sandboxes]
      summary: Get sandbox
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Sandbox }
        '404': { description: Not found }
    patch:
      tags: [Sandboxes]
      summary: Update sandbox
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                config:
                  type: object
                  description: Full replacement sandbox config. Uses the same shape as create.
      responses:
        '200': { description: Updated }
    delete:
      tags: [Sandboxes]
      summary: Delete sandbox
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /accounts/me/sandboxes/{sandboxId}/suspend:
    post:
      tags: [Sandboxes]
      summary: Suspend sandbox instance
      description: Suspends a persistent sandbox reservation. The `reservationKey` must belong to this account and sandbox config.
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationKey]
              properties:
                reservationKey: { type: string }
      responses:
        '200': { description: Suspended }
        '403': { description: Reservation does not belong to this account or sandbox config }
        '409': { description: Provider does not support suspend }

  /accounts/me/sandboxes/{sandboxId}/resume:
    post:
      tags: [Sandboxes]
      summary: Resume sandbox instance
      description: Resumes a persistent sandbox reservation. The `reservationKey` must belong to this account and sandbox config.
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationKey]
              properties:
                reservationKey: { type: string }
      responses:
        '200': { description: Running }
        '403': { description: Reservation does not belong to this account or sandbox config }
        '409': { description: Provider does not support resume }

  /accounts/me/sandboxes/{sandboxId}/terminate:
    post:
      tags: [Sandboxes]
      summary: Terminate sandbox instance
      description: Terminates a persistent sandbox reservation and removes its live-instance registry row. The `reservationKey` must belong to this account and sandbox config.
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationKey]
              properties:
                reservationKey: { type: string }
      responses:
        '200': { description: Terminated }
        '403': { description: Reservation does not belong to this account or sandbox config }
        '409': { description: Provider does not support terminate }

  /accounts/me/sandboxes/{sandboxId}/snapshot:
    post:
      tags: [Sandboxes]
      summary: Snapshot sandbox instance
      description: Creates a reusable image from a persistent sandbox reservation when the provider supports snapshots. Currently supported by the self-hosted workdir `sandbox` provider.
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: sandboxId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationKey, name]
              properties:
                reservationKey: { type: string }
                name: { type: string }
      responses:
        '200': { description: Snapshot active }
        '403': { description: Reservation does not belong to this account or sandbox config }
        '409': { description: Provider does not support snapshot }

  /accounts/me/workspaces:
    post:
      tags:
        - Workspaces
      summary: Create workspace
      description: Create a standalone, account-scoped workspace config (persistent S3 filesystem). Reference its `workspaceId` from an agent config via `workspaces[].workspaceId`. Agents sharing a `workspaceId` share files.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
                config:
                  type: object
                  properties:
                    storage:
                      type: object
                      properties:
                        provider: { type: string, enum: [s3] }
                    harness:
                      type: object
                      properties:
                        enabled: { type: boolean }
            examples:
              notes:
                value:
                  name: notes
                  config: { storage: { provider: s3 }, harness: { enabled: true } }
      responses:
        '201': { description: Workspace created }
    get:
      tags: [Workspaces]
      summary: List workspaces
      security:
        - BearerAuth: []
      responses:
        '200': { description: List of workspaces }

  /accounts/me/workspaces/{workspaceId}:
    get:
      tags: [Workspaces]
      summary: Get workspace
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Workspace }
        '404': { description: Not found }
    patch:
      tags: [Workspaces]
      summary: Update workspace
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Workspaces]
      summary: Delete workspace
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /accounts/me/workspaces/{workspaceId}/files:
    get:
      tags: [Workspaces]
      summary: List workspace files or create a download URL
      description: Lists the authoritative S3 namespace mounted by the workspace. When `path` is supplied, returns a short-lived download URL for that file.
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
        - { name: path, in: query, required: false, schema: { type: string } }
      responses:
        '200': { description: Workspace file list or download URL }
        '404': { description: Workspace or file not found }
    post:
      tags: [Workspaces]
      summary: Upload a workspace file
      description: Uploads or replaces one file. Dashboard-proxied uploads are limited to 512 KiB so the base64 request remains within Convex action limits.
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, contentBase64]
              properties:
                path: { type: string }
                contentBase64: { type: string, format: byte }
                contentType: { type: string }
      responses:
        '201': { description: File uploaded }
    patch:
      tags: [Workspaces]
      summary: Rename a workspace file or folder
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, newPath]
              properties:
                path: { type: string }
                newPath: { type: string }
      responses:
        '200': { description: File or folder renamed }
    delete:
      tags: [Workspaces]
      summary: Delete a workspace file or folder
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: workspaceId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        '200': { description: File or folder deleted }

  /accounts/me/tools:
    post:
      tags: [Tools]
      summary: Create uploaded custom tool
      description: Upload an already-bundled JavaScript tool bundle and model-facing manifest.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountToolCreate'
      responses:
        '201':
          description: Tool created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTool'
    get:
      tags: [Tools]
      summary: List uploaded custom tools
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Tool list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountTool'

  /accounts/me/tools/{toolId}:
    get:
      tags: [Tools]
      summary: Get uploaded custom tool
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: toolId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Tool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTool'
        '404': { description: Not found }
    patch:
      tags: [Tools]
      summary: Update uploaded custom tool
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: toolId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountToolUpdate'
      responses:
        '200':
          description: Updated tool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountTool'
    delete:
      tags: [Tools]
      summary: Delete uploaded custom tool
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: toolId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /accounts/me/skills:
    post:
      tags:
        - Skills
      summary: Create skill
      description: Upload a skill. Skills are stored in S3 under `<accountId>/<skill-name>`. Every bundle must include a root `SKILL.md` with `name` and `description` YAML frontmatter.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
              properties:
                source:
                  type: string
                  enum: [json, files, github]
                name:
                  type: string
                  description: Required for json source
                description:
                  type: string
                  description: Required for json source
                content:
                  type: string
                  description: Skill content (for json source)
                files:
                  type: array
                  description: Skill bundle files for files source. Must include root SKILL.md.
                  items:
                    type: object
                    required:
                      - path
                      - contentBase64
                    properties:
                      path:
                        type: string
                      contentBase64:
                        type: string
                      contentType:
                        type: string
                url:
                  type: string
                  description: GitHub tree URL for github source
            examples:
              json:
                value:
                  source: json
                  name: support-flow
                  description: Handles support triage
                  content: "# Support Flow\n\nClassify urgency, product area, and next action."
      responses:
        '201':
          description: Skill created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
              examples:
                created:
                  value:
                    path: acct_abc123/support-flow
                    name: support-flow
                    description: Handles support triage

    get:
      tags:
        - Skills
      summary: List skills
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of skills
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: '#/components/schemas/Skill'

  /accounts/me/skills/{skillName}:
    get:
      tags:
        - Skills
      summary: Get skill
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

    put:
      tags:
        - Skills
      summary: Update skill
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - source
              properties:
                source:
                  type: string
                  enum: [json, files, github]
                name:
                  type: string
                  description: Required for json source
                description:
                  type: string
                  description: Required for json source
                content:
                  type: string
                  description: Skill content for json source
                files:
                  type: array
                  description: Replacement skill bundle files for files source. Must include root SKILL.md.
                  items:
                    type: object
                    required:
                      - path
                      - contentBase64
                    properties:
                      path:
                        type: string
                      contentBase64:
                        type: string
                      contentType:
                        type: string
                url:
                  type: string
                  description: GitHub tree URL for github source
      responses:
        '200':
          description: Skill updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

    delete:
      tags:
        - Skills
      summary: Delete skill
      security:
        - BearerAuth: []
      parameters:
        - name: skillName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Skill deleted

  /accounts/me/crons:
    post:
      tags:
        - Cron Jobs
      summary: Create cron job
      description: Create a scheduled agent run.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CronCreate'
            examples:
              agentRun:
                value:
                  name: Daily maintenance
                  agentId: agent_maintainer
                  conversationKey: cron:daily-maintenance
                  input: Run daily maintenance.
                  scheduleExpression: cron(0 8 * * ? *)
                  timezone: Europe/Amsterdam
      responses:
        '201':
          description: Cron job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cron'
        '503':
          description: Cron jobs unavailable

    get:
      tags:
        - Cron Jobs
      summary: List cron jobs
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of cron jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  crons:
                    type: array
                    items:
                      $ref: '#/components/schemas/Cron'

  /accounts/me/crons/{cronId}:
    get:
      tags:
        - Cron Jobs
      summary: Get cron job
      security:
        - BearerAuth: []
      parameters:
        - name: cronId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cron job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cron'

    patch:
      tags:
        - Cron Jobs
      summary: Update cron job
      security:
        - BearerAuth: []
      parameters:
        - name: cronId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CronPatch'
      responses:
        '200':
          description: Cron job updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cron'

    delete:
      tags:
        - Cron Jobs
      summary: Delete cron job
      security:
        - BearerAuth: []
      parameters:
        - name: cronId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cron job deleted

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Account secret obtained from account creation or rotation
    AdminAuth:
      type: http
      scheme: bearer
      description: AdminAccountSecret from SST secrets

  schemas:
    DirectApiRequest:
      type: object
      required:
        - agentId
        - eventId
        - conversationKey
        - events
      properties:
        agentId:
          type: string
          description: Selects the account-owned agent config to run
        eventId:
          type: string
          description: Used for account-scoped deduplication
        conversationKey:
          type: string
          description: Selects the account-scoped persisted direct conversation
        events:
          type: array
          description: Vercel AI SDK-style messages
          items:
            $ref: '#/components/schemas/Message'
        system:
          oneOf:
            - $ref: '#/components/schemas/SystemRunEvent'
            - type: array
              items:
                $ref: '#/components/schemas/SystemRunEvent'
          description: >-
            One-turn Vercel AI SDK-style system message event(s), appended last
            with highest priority. Same lifetime as a direct `events` entry with
            `persist: false`.
        model:
          $ref: '#/components/schemas/RunModelOverrides'

    RunModelOverrides:
      type: object
      description: >-
        Per-run model setting overrides, merged onto `config.model` for one
        invocation only. Accepts standard Vercel AI SDK call settings
        (temperature, topP, topK, maxOutputTokens, frequencyPenalty,
        presencePenalty, seed, stopSequences) and provider-specific
        `providerOptions`, the same shape used by `config.model`. The reserved
        keys `provider`, `modelId`, `output`, and `apiKey` are rejected so a
        request cannot swap the model, provider, structured output contract, or
        credentials.
      example:
        temperature: 0.3
        maxOutputTokens: 4096
        providerOptions:
          openai:
            reasoningEffort: high
            reasoningSummary: auto

    Message:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, system, tool]
          description: "System events must use `persist: false` and are only supported on the direct API path"
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ContentBlock'
        persist:
          type: boolean
          description: Must be `false` for system events. Request-local, not stored in DynamoDB.

    SystemRunEvent:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [system]
        content:
          type: string
          example: Answer concisely.
        providerOptions:
          type: object
          additionalProperties: true
          description: Provider-specific system-message options such as prompt caching metadata.
        persist:
          type: boolean
          enum: [false]
          description: Optional marker matching direct ephemeral system events.

    ContentBlock:
      type: object
      discriminator:
        propertyName: type
      oneOf:
        - $ref: '#/components/schemas/TextContent'
        - $ref: '#/components/schemas/ImageContent'
        - $ref: '#/components/schemas/FileContent'
        - $ref: '#/components/schemas/ToolCallContent'
        - $ref: '#/components/schemas/ToolResultContent'
        - $ref: '#/components/schemas/ReasoningContent'
        - $ref: '#/components/schemas/SourceUrlContent'
        - $ref: '#/components/schemas/SourceDocumentContent'
        - $ref: '#/components/schemas/ToolApprovalRequestContent'
        - $ref: '#/components/schemas/ToolApprovalResponseContent'

    TextContent:
      type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          example: text
        text:
          type: string
          example: Hello

    ImageContent:
      type: object
      required:
        - type
        - image
      properties:
        type:
          type: string
          example: image
        image:
          type: string
          description: Base64-encoded image data, URL, or File reference
        mimeType:
          type: string
          description: MIME type of the image (e.g., `image/png`, `image/jpeg`)

    FileContent:
      type: object
      required:
        - type
        - data
      properties:
        type:
          type: string
          example: file
        data:
          type: string
          description: Base64-encoded file data, URL, or File reference
        mimeType:
          type: string
          description: MIME type of the file
        filename:
          type: string

    ToolCallContent:
      type: object
      required:
        - type
        - toolCallId
        - toolName
        - input
      properties:
        type:
          type: string
          example: tool-call
        toolCallId:
          type: string
        toolName:
          type: string
        input:
          type: object
          description: Tool input arguments as generated by the model

    ToolResultContent:
      type: object
      required:
        - type
        - toolCallId
        - toolName
        - output
      properties:
        type:
          type: string
          example: tool-result
        toolCallId:
          type: string
        toolName:
          type: string
        output:
          description: Tool execution result. Can be any JSON value.
        isError:
          type: boolean

    ReasoningContent:
      type: object
      required:
        - type
        - reasoning
      properties:
        type:
          type: string
          example: reasoning
        reasoning:
          type: string
          description: Model's internal reasoning trace (not shown to end users)

    SourceUrlContent:
      type: object
      required:
        - type
        - source
      properties:
        type:
          type: string
          example: source-url
        source:
          type: object
          properties:
            sourceType:
              type: string
              example: url
            url:
              type: string
            title:
              type: string

    SourceDocumentContent:
      type: object
      required:
        - type
        - source
      properties:
        type:
          type: string
          example: source-document
        source:
          type: object
          properties:
            sourceType:
              type: string
              example: document
            documentId:
              type: string
            title:
              type: string
            mediaType:
              type: string

    ToolApprovalRequestContent:
      type: object
      required:
        - type
        - approvalId
        - toolCallId
        - toolName
        - input
      properties:
        type:
          type: string
          example: tool-approval-request
        approvalId:
          type: string
        toolCallId:
          type: string
        toolName:
          type: string
        input:
          type: object
          description: Tool input awaiting user approval

    ToolApprovalResponseContent:
      type: object
      required:
        - type
        - approvalId
        - approved
      properties:
        type:
          type: string
          example: tool-approval-response
        approvalId:
          type: string
          description: Required to match the decision to the pending tool call
        approved:
          type: boolean
          description: Set to false to deny the tool execution
        reason:
          type: string
          description: Reason for approval or denial

    StatusProcessing:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string

    StatusAwaitingApproval:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
        approvals:
          type: array
          items:
            type: object
            properties:
              approvalId:
                type: string
              toolCallId:
                type: string
              toolName:
                type: string
              input:
                type: object

    StatusCompleted:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
        response:
          type: object
          description: Parsed JSON value when structured output is configured

    StatusFailed:
      type: object
      properties:
        eventId:
          type: string
        conversationKey:
          type: string
        status:
          type: string
        error:
          type: string

    ToolCompletionSuccess:
      type: object
      required:
        - status
        - response
      properties:
        status:
          type: string
        response:
          type: object

    ToolCompletionFailure:
      type: object
      required:
        - status
        - error
      properties:
        status:
          type: string
        error:
          type: string

    Error:
      type: object
      properties:
        error:
          type: string

    Account:
      type: object
      properties:
        accountId:
          type: string
        username:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, disabled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        accountId:
          type: string
        agentId:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, disabled]
        config:
          $ref: '#/components/schemas/AgentConfig'
          description: Redacted — secret-like fields are returned as `********`
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Skill:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        description:
          type: string
        files:
          type: array
          description: Relative file paths in the bundle (returned by create and get)
          items:
            type: string

    Cron:
      type: object
      properties:
        accountId:
          type: string
        cronId:
          type: string
        name:
          type: string
        description:
          type: string
        agentId:
          type: string
          description: Account-owned agent to run
        events:
          type: array
          description: Canonical stored model-message list delivered to the agent on each invocation.
          items:
            type: object
        conversationKey:
          type: string
          description: Optional public conversation key. Defaults to `cron:{cronId}`.
        scheduleExpression:
          type: string
          description: EventBridge Scheduler expression, such as `cron(...)`, `rate(...)`, or `at(...)`
        timezone:
          type: string
        status:
          type: string
          enum: [active, paused]
        createdAt:
          type: string
        updatedAt:
          type: string
        lastInvokedAt:
          type: string
        lastStatus:
          type: string
          enum: [started, completed, failed]
        lastError:
          type: string

    CronCreate:
      type: object
      description: Provide exactly one of `input` or `events`, mirroring the agent run input.
      required:
        - name
        - agentId
        - scheduleExpression
      properties:
        name:
          type: string
        description:
          type: string
        agentId:
          type: string
          example: agent_maintainer
        input:
          type: string
          description: Shorthand instruction wrapped into a single user message.
          example: Run daily maintenance.
        events:
          type: array
          description: Full model-message list, used instead of `input` for multimodal or multi-message payloads.
          items:
            type: object
        conversationKey:
          type: string
          example: cron:daily-maintenance
        scheduleExpression:
          type: string
          example: cron(0 8 * * ? *)
        timezone:
          type: string
          example: Europe/Amsterdam
        status:
          type: string
          enum: [active, paused]

    CronPatch:
      type: object
      properties:
        name:
          type: string
        description:
          oneOf:
            - type: string
            - type: "null"
        agentId:
          type: string
        input:
          type: string
        events:
          type: array
          items:
            type: object
        conversationKey:
          oneOf:
            - type: string
            - type: "null"
        scheduleExpression:
          type: string
        timezone:
          oneOf:
            - type: string
            - type: "null"
        status:
          type: string
          enum: [active, paused]

    DeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        cleanup:
          type: object
          properties:
            conversationsDeleted:
              type: integer
            processedEventsDeleted:
              type: integer
            asyncAgentResultDeleted:
              type: integer
            asyncToolResultDeleted:
              type: integer
            filesystemObjectsDeleted:
              type: integer
            agentsDeleted:
              type: integer
            skillObjectsDeleted:
              type: integer
            cronsDeleted:
              type: integer
            accountToolsDeleted:
              type: integer

    AgentConfig:
      type: object
      description: Agent runtime configuration passed via agent create/update. Config patch is a deep merge.
      properties:
        provider:
          $ref: '#/components/schemas/ProviderConfig'
        model:
          $ref: '#/components/schemas/ModelConfig'
        agent:
          $ref: '#/components/schemas/AgentRuntimeConfig'
        hooks:
          $ref: '#/components/schemas/HooksConfig'
        skills:
          $ref: '#/components/schemas/SkillsConfig'
        subagent:
          $ref: '#/components/schemas/SubagentConfig'
        publicAccess:
          type: boolean
          description: "Opt the agent into the public runtime endpoint (SSE/WebSocket via the environment runtime key). Off by default — secured. When false/unset, public-key requests for this agent are refused with HTTP 403 (code public_access_disabled); internal callers and channel webhooks are unaffected."
        sandbox:
          type: string
          description: Id of the agent-level sandbox config (POST /accounts/me/sandboxes). Powers stateless bash and is the default sandbox for workspaces that don't set their own.
        workspaces:
          type: array
          description: References to account-scoped workspace configs. Agents sharing a workspaceId share files.
          items:
            type: object
            required: [name, workspaceId]
            properties:
              name:
                type: string
                description: Agent-facing mount label (the `workspace` arg the model selects). Unique per agent.
              workspaceId:
                type: string
              sandbox:
                type: [string, "null"]
                description: Optional per-workspace sandbox. A sandbox id overrides the agent-level `sandbox` for this workspace (and its permissionMode). `null` forces this workspace read-only even when an agent-level default exists. Omitted => inherit the agent-level `sandbox`; with no effective sandbox the workspace is read-only (read/glob served directly from S3).
        session:
          $ref: '#/components/schemas/SessionConfig'
        tools:
          $ref: '#/components/schemas/ToolsConfig'
        channels:
          $ref: '#/components/schemas/ChannelsConfig'

    ProviderConfig:
      type: object
      description: Constructor settings for the AI SDK provider. The selected provider entry must exist and include its `apiKey`. Secret-like fields are encrypted at rest and redacted from reads.
      properties:
        google:
          type: object
          description: Google Generative AI provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            headers:
              type: object
        openai:
          type: object
          description: OpenAI provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            organization:
              type: string
            project:
              type: string
            name:
              type: string
        bedrock:
          type: object
          description: AWS Bedrock provider
          properties:
            region:
              type: string
            apiKey:
              type: string
            accessKeyId:
              type: string
            secretAccessKey:
              type: string
            sessionToken:
              type: string
        gateway:
          type: object
          description: Gateway provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            headers:
              type: object
        minimax:
          type: object
          description: MiniMax provider
          properties:
            apiKey:
              type: string
            baseURL:
              type: string
            headers:
              type: object

    ModelConfig:
      type: object
      description: Controls the Vercel AI SDK `streamText` call. All standard call settings pass through directly, and provider-specific settings use `providerOptions`.
      properties:
        provider:
          type: string
          description: Provider constructor key matching `provider` config
        modelId:
          type: string
          description: Provider-specific model identifier
        temperature:
          type: number
        maxOutputTokens:
          type: integer
        topP:
          type: number
        topK:
          type: integer
        presencePenalty:
          type: number
        frequencyPenalty:
          type: number
        seed:
          type: integer
        maxRetries:
          type: integer
        stopSequences:
          type: array
          items:
            type: string
        timeout:
          description: Vercel AI SDK timeout setting in milliseconds or `{ totalMs }`
          oneOf:
            - type: integer
            - type: object
              properties:
                totalMs:
                  type: integer
        output:
          $ref: '#/components/schemas/OutputConfig'
        providerOptions:
          type: object
          description: Vercel AI SDK provider-specific options

    OutputConfig:
      type: object
      description: Structured output config. JSON-only so it can be stored in encrypted agent config. Use JSON Schema rather than Zod.
      properties:
        type:
          type: string
          enum: [text, object, array, choice, json]
        name:
          type: string
        description:
          type: string
        schema:
          type: object
          description: JSON Schema for `object` type
        element:
          type: object
          description: JSON Schema for `array` element type
        options:
          type: array
          items:
            type: string
          description: String options for `choice` type

    AgentRuntimeConfig:
      type: object
      description: Controls harness behavior for the model/tool loop and agent-level system prompt.
      properties:
        maxTurn:
          type: integer
          description: Maximum model/tool loop steps per conversation turn
        system:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/SystemRunEvent'
            - type: array
              items:
                $ref: '#/components/schemas/SystemRunEvent'
          description: Agent-level system prompt used on every run. Accepts a string shorthand or Vercel AI SDK-style system message event(s).

    HooksConfig:
      type: object
      description: Lifecycle hooks publish stable agent runtime events. Delivery is best-effort.
      properties:
        webhooks:
          type: array
          description: Outbound event webhooks. An agent may register several; every enabled entry whose events allow-list matches is delivered independently.
          items:
            type: object
            properties:
              enabled:
                type: boolean
              url:
                type: string
                description: HTTPS endpoint for event JSON
              secret:
                type: string
                description: HMAC signing secret for `X-Webhook-Signature`
              events:
                type: array
                items:
                  type: string
                description: Optional allow-list; omitted means all events

    SkillsConfig:
      type: object
      description: When enabled, the runtime includes allowed skill metadata in the system prompt and exposes `load_skill`.
      properties:
        enabled:
          type: boolean
        allowed:
          type: array
          items:
            type: string
          description: Account-scoped skill paths (e.g., `acct_.../support-flow`)

    SubagentConfig:
      type: object
      description: When enabled, the runtime exposes `run_subagent` and adds predefined subagent metadata to the parent prompt.
      properties:
        enabled:
          type: boolean
        allowed:
          type: array
          items:
            type: string
          description: Predefined same-account agent ids; empty means virtual subagents only
        context:
          type: string
          enum: [new, inherited]
          description: Default child context mode; omitted means `new`
        mode:
          type: string
          enum: [ephemeral, persistent]
          description: Child conversation persistence mode; omitted means `ephemeral`

    SessionConfig:
      type: object
      description: Controls model-visible history management.
      properties:
        pruning:
          type: object
          properties:
            enabled:
              type: boolean
              description: "Automatic history pruning (default: `true`)"
        compaction:
          type: object
          properties:
            enabled:
              type: boolean
              description: "Context compaction (default: `false`)"
            maxContextLength:
              type: integer
              description: Serialized character-length threshold

    ToolsConfig:
      type: object
      description: "Enables built-in tools by static name and uploaded account tools by `toolId` key. Omitting or `enabled: false` disables the tool."
      properties:
        tavilySearch:
          $ref: '#/components/schemas/TavilySearchConfig'
        tavilyExtract:
          $ref: '#/components/schemas/TavilyExtractConfig'
        googleSearch:
          $ref: '#/components/schemas/GoogleSearchConfig'
        handoffs:
          type: object
          description: "Human-handoff tool: Pancake scenario tags + Zalo staff ping. Both `pancake.scenarioTagIds.{order,pending}` and `zalo.{botToken,notifyUserIds}` are required unless `enabled: false`."
          properties:
            enabled:
              type: boolean
            pancake:
              type: object
              properties:
                scenarioTagIds:
                  type: object
                  properties:
                    order:
                      type: string
                    pending:
                      type: string
            zalo:
              type: object
              properties:
                botToken:
                  type: string
                notifyUserIds:
                  type: array
                  items:
                    type: string
      additionalProperties:
        $ref: '#/components/schemas/UploadedToolConfig'

    AccountToolCreate:
      type: object
      required: [name, description, inputSchema, bundle]
      properties:
        name:
          type: string
          description: Model-facing tool name.
        description:
          type: string
        inputSchema:
          type: object
          description: JSON Schema for the AI SDK tool input.
        bundle:
          type: string
          description: Already-bundled JavaScript module source.
        defaultConfig:
          type: object
          description: Non-secret default runtime config.

    AccountToolUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: object
        bundle:
          type: string
        defaultConfig:
          type: object

    AccountTool:
      type: object
      properties:
        accountId:
          type: string
        toolId:
          type: string
          example: tool_abc123
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: object
        sha256:
          type: string
        defaultConfig:
          type: object
        status:
          type: string
          enum: [active, deleted]
        createdAt:
          type: string
        updatedAt:
          type: string
        deletedAt:
          type: string

    UploadedToolConfig:
      type: object
      description: "Config for an account-uploaded custom tool. The object key is the returned `toolId`."
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        needsApproval:
          type: boolean
        config:
          type: object
          description: "Runtime config merged over the tool's upload-time `defaultConfig`."

    TavilySearchConfig:
      type: object
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        needsApproval:
          type: boolean
        apiKey:
          type: string
        searchDepth:
          type: string
          enum: [basic, advanced]
        includeAnswer:
          type: boolean
        maxResults:
          type: integer
          description: "1–20, default: 5"
        topic:
          type: string
          enum: [general, news, finance]

    TavilyExtractConfig:
      type: object
      properties:
        enabled:
          type: boolean
        async:
          type: boolean
        needsApproval:
          type: boolean
        apiKey:
          type: string
        extractDepth:
          type: string
          enum: [basic, advanced]
        format:
          type: string
          enum: [markdown, text]

    GoogleSearchConfig:
      type: object
      description: Requires `config.model.provider` to be `google`. Provider-defined tools cannot use async wrapping.
      properties:
        enabled:
          type: boolean
        needsApproval:
          type: boolean
        searchTypes:
          type: object
          description: "Keys: `webSearch`, `imageSearch`"
        timeRangeFilter:
          type: object
          properties:
            startTime:
              type: string
              description: ISO date string
            endTime:
              type: string
              description: ISO date string

    ChannelsConfig:
      type: object
      description: Channel webhook configuration. Webhook URLs follow the pattern `/webhooks/{accountId}/{agentId}/{channel}`.
      properties:
        telegram:
          type: object
          properties:
            apiUrl:
              type: string
            botToken:
              type: string
            webhookSecret:
              type: string
            allowedChatIds:
              type: array
              items:
                type: integer
            reactionEmoji:
              type: string
        github:
          type: object
          properties:
            apiUrl:
              type: string
            webhookSecret:
              type: string
            appId:
              type: string
            privateKey:
              type: string
              description: GitHub App private key (PEM)
            allowedRepos:
              type: array
              items:
                type: string
              description: Repository slugs (`owner/repo`)
        slack:
          type: object
          properties:
            apiUrl:
              type: string
            botToken:
              type: string
            signingSecret:
              type: string
            allowedChannelIds:
              type: array
              items:
                type: string
            reactionEmoji:
              type: string
        discord:
          type: object
          properties:
            apiUrl:
              type: string
            botToken:
              type: string
            publicKey:
              type: string
            allowedGuildIds:
              type: array
              items:
                type: string
        pancake:
          type: object
          description: Pancake sends no signature header; the webhook URL must carry `?secret=<webhookSecret>`, checked on every request.
          properties:
            pageId:
              type: string
            pageAccessToken:
              type: string
            webhookSecret:
              type: string
              description: Random value verified against the webhook URL's `secret` query parameter.
            senderId:
              type: string
              description: Optional staff user ID for replies
            options:
              type: object
              description: Optional Pancake adapter settings.
              properties:
                ignoreTagIds:
                  type: array
                  items:
                    type: string
                  description: Conversation tag IDs that mark human handoff; tagged conversations are ignored.
        zalo:
          type: object
          description: Official Zalo Bot API webhook channel for direct text messages.
          properties:
            botToken:
              type: string
            webhookSecret:
              type: string
              minLength: 8
              maxLength: 256
              description: Zalo webhook secret token, sent as `X-Bot-Api-Secret-Token`.
            allowedUserIds:
              type: array
              items:
                type: string
              description: Zalo user IDs allowed to trigger the agent.
