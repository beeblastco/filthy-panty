{{- if and .Values.sandbox.enabled .Values.sandbox.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "sandbox.fullname" . }}
  namespace: {{ include "clonee.namespace" . }}
  labels:
    {{- include "clonee.labels" . | nindent 4 }}
    {{- include "sandbox.selectorLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "sandbox.fullname" . }}
  minReplicas: {{ .Values.sandbox.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.sandbox.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.sandbox.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.sandbox.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
