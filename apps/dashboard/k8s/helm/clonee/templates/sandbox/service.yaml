{{- if .Values.sandbox.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sandbox.fullname" . }}
  namespace: {{ include "clonee.namespace" . }}
  labels:
    {{- include "clonee.labels" . | nindent 4 }}
    {{- include "sandbox.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.sandbox.service.type }}
  ports:
    - port: {{ .Values.sandbox.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "sandbox.selectorLabels" . | nindent 4 }}
{{- end }}
