{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clonee.secretName" . }}
  namespace: {{ include "clonee.namespace" . }}
  labels:
    {{- include "clonee.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- /* Agent Gateway secrets */}}
  {{- with .Values.agentGateway.env }}
  {{- if .CONVEX_SITE_URL }}
  CONVEX_SITE_URL: {{ .CONVEX_SITE_URL | quote }}
  {{- end }}
  {{- if .GATEWAY_SHARED_SECRET }}
  GATEWAY_SHARED_SECRET: {{ .GATEWAY_SHARED_SECRET | quote }}
  {{- end }}
  {{- if .AGENT_API_KEY_PEPPER }}
  AGENT_API_KEY_PEPPER: {{ .AGENT_API_KEY_PEPPER | quote }}
  {{- end }}
  {{- if .AI_GATEWAY_API_KEY }}
  AI_GATEWAY_API_KEY: {{ .AI_GATEWAY_API_KEY | quote }}
  {{- end }}
  {{- if .TAVILY_API_KEY }}
  TAVILY_API_KEY: {{ .TAVILY_API_KEY | quote }}
  {{- end }}
  {{- if .AWS_REGION }}
  AWS_REGION: {{ .AWS_REGION | quote }}
  {{- end }}
  {{- if .AWS_S3_BUCKET }}
  AWS_S3_BUCKET: {{ .AWS_S3_BUCKET | quote }}
  {{- end }}
  {{- if .AWS_ACCESS_KEY_ID }}
  AWS_ACCESS_KEY_ID: {{ .AWS_ACCESS_KEY_ID | quote }}
  {{- end }}
  {{- if .AWS_SECRET_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: {{ .AWS_SECRET_ACCESS_KEY | quote }}
  {{- end }}
  {{- end }}
  {{- /* Sandbox secrets */}}
  {{- with .Values.sandbox.env }}
  {{- if .SANDBOX_SHARED_SECRET }}
  SANDBOX_SHARED_SECRET: {{ .SANDBOX_SHARED_SECRET | quote }}
  {{- end }}
  {{- end }}
{{- end }}
