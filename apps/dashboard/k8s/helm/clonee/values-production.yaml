# Production values for K3s on Hetzner Cloud
# Usage: helm install clonee ./k8s/helm/clonee -f ./k8s/helm/clonee/values-production.yaml

global:
  imageRegistry: ghcr.io/beeblastco
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: ghcr-pull-secret

# =============================================================================
# Agent Gateway — production
# =============================================================================
agentGateway:
  replicaCount: 2

  image:
    tag: "latest"  # pin to a specific tag in CI/CD

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      # cert-manager for automatic TLS via Let's Encrypt
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: api.clonee.dev  # <-- replace with your domain
        paths:
          - path: /v1
            pathType: Prefix
    tls:
      - secretName: agent-gateway-tls
        hosts:
          - api.clonee.dev  # <-- replace with your domain

  # -- Fill these in or use external-secrets / sealed-secrets
  env:
    CONVEX_SITE_URL: ""
    GATEWAY_SHARED_SECRET: ""
    AGENT_API_KEY_PEPPER: ""
    AI_GATEWAY_API_KEY: ""
    TAVILY_API_KEY: ""
    AWS_REGION: ""
    AWS_S3_BUCKET: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""

# =============================================================================
# Sandbox — production
# =============================================================================
sandbox:
  replicaCount: 2

  image:
    tag: "latest"  # pin to a specific tag in CI/CD

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  securityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000

  env:
    SANDBOX_SHARED_SECRET: ""

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # Set to false if you use external-secrets-operator or sealed-secrets
  create: true
