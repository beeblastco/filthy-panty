name: Build Dashboard Image

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'apps/dashboard/**'
      - 'packages/convex/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/build-dashboard.yaml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/beeblastco/filthy-panty-dashboard

jobs:
  build:
    runs-on: ubuntu-24.04
    # main builds against the production Convex deployment, everything else
    # against dev. Environment-scoped vars (NEXT_PUBLIC_CONVEX_URL, ...) override
    # the repo-level dev defaults. Convex itself is deployed by deploy-convex.yaml.
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        # Dashboard image builds do not need core's SST provider install; the
        # Dockerfile uses the same flag before building the app image.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Type-check dashboard
        run: cd apps/dashboard && npx tsc --noEmit

      - name: Validate build variables
        shell: bash
        env:
          NEXT_PUBLIC_CONVEX_URL: ${{ vars.NEXT_PUBLIC_CONVEX_URL }}
        run: |
          if [[ -z "$NEXT_PUBLIC_CONVEX_URL" ]]; then
            echo "Missing repository variable: NEXT_PUBLIC_CONVEX_URL" >&2
            exit 1
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_AGENT_GATEWAY_URL=${{ vars.NEXT_PUBLIC_AGENT_GATEWAY_URL }}
            NEXT_PUBLIC_CONVEX_URL=${{ vars.NEXT_PUBLIC_CONVEX_URL }}
            NEXT_PUBLIC_WORKOS_REDIRECT_URI=${{ vars.NEXT_PUBLIC_WORKOS_REDIRECT_URI }}
            NEXT_PUBLIC_FILTHY_PANTY_BASE_URL=${{ vars.NEXT_PUBLIC_FILTHY_PANTY_BASE_URL || 'https://app.beeblast.co' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
