name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy. Defaults to repository variable SST_STAGE or dev.
        required: false
        type: string

concurrency:
  group: sst-deploy-${{ github.event.repository.name }}-${{ inputs.stage || vars.SST_STAGE || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      INPUT_STAGE: ${{ inputs.stage }}
      DEFAULT_STAGE: ${{ vars.SST_STAGE }}
      CI: "true"
    steps:
      - name: Resolve deploy configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          STAGE="${INPUT_STAGE:-${DEFAULT_STAGE:-dev}}"

          if [[ -z "${AWS_REGION:-}" ]]; then
            echo "Missing required repository variable: AWS_REGION" >&2
            exit 1
          fi

          if [[ -z "${AWS_ROLE_ARN:-}" ]]; then
            echo "Missing required repository variable: AWS_ROLE_ARN" >&2
            exit 1
          fi

          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "SST_STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Run unit tests
        run: bun run test

      - name: Build Lambda binaries
        run: bun run build

      - name: Deploy SST app
        env:
          SST_SECRET_GoogleApiKey: ${{ secrets.SST_SECRET_GOOGLEAPIKEY }}
          SST_SECRET_TavilyApiKey: ${{ secrets.SST_SECRET_TAVILYAPIKEY }}
          SST_SECRET_AdminAccountSecret: ${{ secrets.SST_SECRET_ADMINACCOUNTSECRET }}
          SST_SECRET_AccountConfigEncryptionSecret: ${{ secrets.SST_SECRET_ACCOUNTCONFIGENCRYPTIONSECRET }}
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            SST_SECRET_GoogleApiKey \
            SST_SECRET_TavilyApiKey \
            SST_SECRET_AdminAccountSecret \
            SST_SECRET_AccountConfigEncryptionSecret
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required repository secret: $name" >&2
              exit 1
            fi
          done

          bunx sst deploy --stage "$SST_STAGE"

      - name: Configure Telegram account webhook
        env:
          ADMIN_ACCOUNT_SECRET: ${{ secrets.SST_SECRET_ADMINACCOUNTSECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.SST_SECRET_TELEGRAMBOTTOKEN }}
          TELEGRAM_WEBHOOK_SECRET: ${{ secrets.SST_SECRET_TELEGRAMWEBHOOKSECRET }}
          ALLOWED_CHAT_IDS: ${{ secrets.SST_SECRET_ALLOWEDCHATIDS }}
          TELEGRAM_ACCOUNT_USERNAME: telegram-default
          TELEGRAM_ACCOUNT_DESCRIPTION: Default Telegram account managed by CI/CD.
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            ADMIN_ACCOUNT_SECRET \
            TELEGRAM_BOT_TOKEN \
            TELEGRAM_WEBHOOK_SECRET \
            ALLOWED_CHAT_IDS
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required Telegram account configuration secret: $name" >&2
              exit 1
            fi
          done

          bun run scripts/configure-telegram-account.ts
