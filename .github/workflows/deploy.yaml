# Deploy pipeline.
# `main` = SaaS production: PR CI already validated, skip re-validation and
#   deploy directly (Convex storage provider).
# `dev` = OSS / community staging: re-validates (typecheck + test + build)
#   before deploying. Uses Convex storage when the development environment
#   provides CONVEX_URL + CONVEX_DEPLOY_KEY, otherwise DynamoDB.

name: Deploy

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'apps/docs/**'
      - 'apps/dashboard/**'
      - '.github/workflows/deploy-docs.yaml'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy. Defaults to production for main and dev for dev.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    # main trusts PR CI; everything else (dev, manual dispatch) re-validates.
    if: ${{ github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      CI: "true"
      # sst.config.ts reads these at runtime (no in-source defaults); postinstall
      # `sst install` fails without them.
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      PROJECT_OWNER_EMAIL: ${{ vars.PROJECT_OWNER_EMAIL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        # Skip workspace postinstall (`sst install`) during validation. The
        # deploy job installs with the same flag and runs SST explicitly after
        # resolving the stage and AWS credentials.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run check

      - name: Run unit tests
        run: bun run test

      - name: Build Lambda binaries
        run: bun run build

  deploy:
    needs: validate
    # Run if validate succeeded OR validate was skipped (main branch).
    if: ${{ always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'))) }}
    runs-on: ubuntu-24.04
    # Resolves CONVEX_URL/CONVEX_DEPLOY_KEY from the matching environment:
    # production (prod Convex) on main, development (dev Convex) otherwise.
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}
    concurrency:
      group: ${{ github.workflow }}-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.stage || github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEFAULT_AWS_REGION: ${{ vars.AWS_REGION }}
      PRODUCTION_AWS_REGION: ${{ vars.PRODUCTION_AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      # Account/project identity for resource names, IAM ARNs, and tags. sst.config.ts
      # falls back to placeholders when unset, so set these repo vars for deploys to
      # target the real AWS account.
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      PROJECT_OWNER_EMAIL: ${{ vars.PROJECT_OWNER_EMAIL }}
      INPUT_STAGE: ${{ inputs.stage }}
      # Switches behavior between local development and CI environments
      CI: "true"
      ACCOUNT_MODEL_PROVIDER: ${{ vars.ACCOUNT_MODEL_PROVIDER || 'google' }}
      ACCOUNT_MODEL_ID: ${{ vars.ACCOUNT_MODEL_ID || 'gemma-4-31b-it' }}
      ACCOUNT_MODEL_OPTIONS_JSON: ${{ vars.ACCOUNT_MODEL_OPTIONS_JSON }}
      ACCOUNT_PROVIDER_CONFIG_JSON: ${{ secrets.ACCOUNT_PROVIDER_CONFIG_JSON }}
      ACCOUNT_TOOLS_JSON: ${{ vars.ACCOUNT_TOOLS_JSON }}
      ACCOUNT_GOOGLE_API_KEY: ${{ secrets.ACCOUNT_GOOGLE_API_KEY || secrets.SST_SECRET_GOOGLEAPIKEY }}
      ACCOUNT_TAVILY_API_KEY: ${{ secrets.ACCOUNT_TAVILY_API_KEY || secrets.SST_SECRET_TAVILYAPIKEY }}
      ACCOUNT_OPENAI_API_KEY: ${{ secrets.ACCOUNT_OPENAI_API_KEY }}
      ACCOUNT_OPENAI_BASE_URL: ${{ vars.ACCOUNT_OPENAI_BASE_URL }}
      ACCOUNT_OPENAI_ORGANIZATION: ${{ vars.ACCOUNT_OPENAI_ORGANIZATION }}
      ACCOUNT_OPENAI_PROJECT: ${{ vars.ACCOUNT_OPENAI_PROJECT }}
      ACCOUNT_BEDROCK_API_KEY: ${{ secrets.ACCOUNT_BEDROCK_API_KEY }}
      ACCOUNT_BEDROCK_REGION: ${{ vars.ACCOUNT_BEDROCK_REGION || vars.AWS_REGION }}
      ACCOUNT_BEDROCK_ACCESS_KEY_ID: ${{ secrets.ACCOUNT_BEDROCK_ACCESS_KEY_ID }}
      ACCOUNT_BEDROCK_SECRET_ACCESS_KEY: ${{ secrets.ACCOUNT_BEDROCK_SECRET_ACCESS_KEY }}
      ACCOUNT_BEDROCK_SESSION_TOKEN: ${{ secrets.ACCOUNT_BEDROCK_SESSION_TOKEN }}
      ACCOUNT_GATEWAY_API_KEY: ${{ secrets.ACCOUNT_GATEWAY_API_KEY }}
      ENABLE_DIRECT_API: ${{ vars.ENABLE_DIRECT_API || 'false' }}
      ENABLE_WEBSOCKET: ${{ vars.ENABLE_WEBSOCKET || 'false' }}
      # Create the image-based sandbox Lambdas only after the arm64 image is in THIS stage's
      # region ECR repo. The flag is per-stage because dev and production deploy to different
      # regions that bootstrap independently: leave a stage's flag unset for its region's first
      # deploy (creates the empty repo, functions skipped), then set it to 'true' once
      # lambda-sanbdox CI has mirrored the image. Resolved per-stage in the step below.
      # dev falls back to the legacy repo-wide SANDBOX_IMAGE_READY for backward compatibility.
      # See docs/workspace/sandbox/lambda.md.
      SANDBOX_IMAGE_READY_DEV: ${{ vars.SANDBOX_IMAGE_READY_DEV || vars.SANDBOX_IMAGE_READY || 'false' }}
      SANDBOX_IMAGE_READY_PRODUCTION: ${{ vars.SANDBOX_IMAGE_READY_PRODUCTION || 'false' }}
      NATS_URL: ${{ secrets.NATS_URL }}
      NATS_TOKEN: ${{ secrets.NATS_TOKEN }}
      DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
      DAYTONA_ORGANIZATION_ID: ${{ vars.DAYTONA_ORGANIZATION_ID }}
      DAYTONA_API_URL: ${{ vars.DAYTONA_API_URL }}
      DAYTONA_TARGET: ${{ vars.DAYTONA_TARGET }}
      DAYTONA_S3_SNAPSHOT_NAME: ${{ vars.DAYTONA_S3_SNAPSHOT_NAME }}
      DAYTONA_S3_SNAPSHOT_BASE_IMAGE: ${{ vars.DAYTONA_S3_SNAPSHOT_BASE_IMAGE }}
      # kubernetes sandbox provider (non-secret knobs; kubeconfig is an SST secret).
      KUBERNETES_SANDBOX_NAMESPACE: ${{ vars.KUBERNETES_SANDBOX_NAMESPACE }}
      KUBERNETES_SANDBOX_IMAGE: ${{ vars.KUBERNETES_SANDBOX_IMAGE }}
      KUBERNETES_SANDBOX_SERVICE_ACCOUNT: ${{ vars.KUBERNETES_SANDBOX_SERVICE_ACCOUNT }}
      KUBERNETES_SANDBOX_IMAGE_PULL_SECRETS: ${{ vars.KUBERNETES_SANDBOX_IMAGE_PULL_SECRETS }}
      # Convex storage provider. Resolved per environment (production on main,
      # development otherwise). A stage uses Convex when both are set, else DynamoDB.
      CONVEX_URL: ${{ secrets.CONVEX_URL }}
      CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
      # This is for testing purposes only.
      MOCK_WEBHOOK_SECRET: ${{ secrets.MOCK_WEBHOOK_SECRET }}
    steps:
      - name: Resolve deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_STAGE:-}" ]]; then
            STAGE="$INPUT_STAGE"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            STAGE="production"
          else
            STAGE="dev"
          fi

          if [[ "$STAGE" == "production" ]]; then
            AWS_REGION="${PRODUCTION_AWS_REGION:-}"
            SANDBOX_IMAGE_READY="${SANDBOX_IMAGE_READY_PRODUCTION:-false}"
          else
            AWS_REGION="${DEFAULT_AWS_REGION:-}"
            SANDBOX_IMAGE_READY="${SANDBOX_IMAGE_READY_DEV:-false}"
          fi

          if [[ -z "${AWS_REGION:-}" ]]; then
            echo "Missing AWS region for stage: $STAGE" >&2
            exit 1
          fi

          if [[ -z "${AWS_ROLE_ARN:-}" ]]; then
            echo "Missing required repository variable: AWS_ROLE_ARN" >&2
            exit 1
          fi

          if [[ "${ENABLE_WEBSOCKET:-false}" == "true" && -z "${NATS_URL:-}" ]]; then
            echo "NATS_URL must be set when ENABLE_WEBSOCKET=true" >&2
            exit 1
          fi

          echo "SST_STAGE=$STAGE" >> "$GITHUB_ENV"
          echo "AWS_REGION=$AWS_REGION" >> "$GITHUB_ENV"
          echo "SANDBOX_IMAGE_READY=$SANDBOX_IMAGE_READY" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build Lambda binaries
        run: bun run build

      - name: Clear stale SST deploy lock
        shell: bash
        working-directory: apps/core
        run: |
          set -euo pipefail
          bunx sst unlock --stage "$SST_STAGE" || true

      - name: Deploy SST app
        working-directory: apps/core
        env:
          SST_SECRET_GoogleApiKey: ${{ secrets.SST_SECRET_GOOGLEAPIKEY }}
          SST_SECRET_TavilyApiKey: ${{ secrets.SST_SECRET_TAVILYAPIKEY }}
          SST_SECRET_AdminAccountSecret: ${{ secrets.SST_SECRET_ADMINACCOUNTSECRET }}
          SST_SECRET_AccountConfigEncryptionSecret: ${{ secrets.SST_SECRET_ACCOUNTCONFIGENCRYPTIONSECRET }}
          SST_SECRET_DaytonaApiKey: ${{ secrets.DAYTONA_API_KEY }}
          # Optional: base64 kubeconfig for the kubernetes sandbox provider. Not in the
          # required-secrets loop below, so stages that don't use it still deploy.
          SST_SECRET_KubernetesSandboxKubeconfig: ${{ secrets.KUBERNETES_SANDBOX_KUBECONFIG }}
          MOCK_WEBHOOK_SECRET: ${{ secrets.MOCK_WEBHOOK_SECRET }}
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            SST_SECRET_GoogleApiKey \
            SST_SECRET_TavilyApiKey \
            SST_SECRET_AdminAccountSecret \
            SST_SECRET_AccountConfigEncryptionSecret \
            SST_SECRET_DaytonaApiKey \
            MOCK_WEBHOOK_SECRET
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required repository secret: $name" >&2
              exit 1
            fi
          done

          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3"
            if bunx sst deploy --stage "$SST_STAGE" --print-logs; then
              exit 0
            fi
            echo "Deploy failed, retrying in 15s..."
            sleep 15
          done
          echo "All deploy attempts failed" >&2
          exit 1
