name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: SST stage to deploy. Defaults to repository variable SST_STAGE or production.
        required: false
        type: string

concurrency:
  group: sst-deploy-${{ github.event.repository.name }}-${{ inputs.stage || vars.SST_STAGE || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      INPUT_STAGE: ${{ inputs.stage }}
      DEFAULT_STAGE: ${{ vars.SST_STAGE }}
      ENABLE_DIRECT_API: ${{ vars.ENABLE_DIRECT_API || 'false' }}
      ENABLE_TELEGRAM_INTEGRATION: ${{ vars.ENABLE_TELEGRAM_INTEGRATION || 'false' }}
      ENABLE_GITHUB_INTEGRATION: ${{ vars.ENABLE_GITHUB_INTEGRATION || 'true' }}
      ENABLE_SLACK_INTEGRATION: ${{ vars.ENABLE_SLACK_INTEGRATION || 'true' }}
      ENABLE_DISCORD_INTEGRATION: ${{ vars.ENABLE_DISCORD_INTEGRATION || 'true' }}
      GITHUB_ALLOWED_REPOS: ${{ vars.GITHUB_ALLOWED_REPOS }}
      SLACK_ALLOWED_CHANNEL_IDS: ${{ vars.SLACK_ALLOWED_CHANNEL_IDS }}
      DISCORD_ALLOWED_GUILD_IDS: ${{ vars.DISCORD_ALLOWED_GUILD_IDS }}
      DISCORD_APPLICATION_ID: ${{ vars.DISCORD_APPLICATION_ID }}
      DISCORD_SYNC_GUILD_ID: ${{ vars.DISCORD_SYNC_GUILD_ID }}
      CI: "true"
    steps:
      - name: Resolve deploy configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          STAGE="${INPUT_STAGE:-${DEFAULT_STAGE:-production}}"

          if [[ -z "${AWS_REGION:-}" ]]; then
            echo "Missing required repository variable: AWS_REGION" >&2
            exit 1
          fi

          if [[ -z "${AWS_ROLE_ARN:-}" ]]; then
            echo "Missing required repository variable: AWS_ROLE_ARN" >&2
            exit 1
          fi

          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"
          echo "SST_STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Run unit tests
        run: bun run test

      - name: Build Lambda binaries
        run: bun run build

      - name: Deploy SST app
        env:
          SST_SECRET_DirectApiSecret: ${{ secrets.SST_SECRET_DirectApiSecret }}
          SST_SECRET_TelegramBotToken: ${{ secrets.SST_SECRET_TelegramBotToken }}
          SST_SECRET_TelegramWebhookSecret: ${{ secrets.SST_SECRET_TelegramWebhookSecret }}
          SST_SECRET_AllowedChatIds: ${{ secrets.SST_SECRET_AllowedChatIds }}
          SST_SECRET_GoogleApiKey: ${{ secrets.SST_SECRET_GoogleApiKey }}
          SST_SECRET_TavilyApiKey: ${{ secrets.SST_SECRET_TavilyApiKey }}
          SST_SECRET_GitHubWebhookSecret: ${{ secrets.SST_SECRET_GitHubWebhookSecret }}
          SST_SECRET_GitHubAppId: ${{ secrets.SST_SECRET_GitHubAppId }}
          SST_SECRET_GitHubPrivateKey: ${{ secrets.SST_SECRET_GitHubPrivateKey }}
          SST_SECRET_SlackBotToken: ${{ secrets.SST_SECRET_SlackBotToken }}
          SST_SECRET_SlackSigningSecret: ${{ secrets.SST_SECRET_SlackSigningSecret }}
          SST_SECRET_DiscordBotToken: ${{ secrets.SST_SECRET_DiscordBotToken }}
          SST_SECRET_DiscordPublicKey: ${{ secrets.SST_SECRET_DiscordPublicKey }}
        run: bunx sst deploy --stage "$SST_STAGE"

      - name: Sync Discord commands
        if: ${{ env.ENABLE_DISCORD_INTEGRATION == 'true' }}
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.SST_SECRET_DiscordBotToken }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${DISCORD_APPLICATION_ID:-}" ]]; then
            echo "Missing required repository variable: DISCORD_APPLICATION_ID" >&2
            exit 1
          fi

          if [[ -z "${DISCORD_BOT_TOKEN:-}" ]]; then
            echo "Missing required repository secret: SST_SECRET_DiscordBotToken" >&2
            exit 1
          fi

          bun run discord:sync

      - name: Sync Telegram webhook
        if: ${{ env.ENABLE_TELEGRAM_INTEGRATION == 'true' }}
        env:
          SST_SECRET_TelegramBotToken: ${{ secrets.SST_SECRET_TelegramBotToken }}
          SST_SECRET_TelegramWebhookSecret: ${{ secrets.SST_SECRET_TelegramWebhookSecret }}
        shell: bash
        run: |
          set -euo pipefail

          FUNCTION_URL="$(bun -e 'const outputs = JSON.parse(await Bun.file(".sst/outputs.json").text()); process.stdout.write(outputs.harnessProcessingUrl ?? "")')"

          if [[ -z "${FUNCTION_URL:-}" ]]; then
            echo "Failed to resolve harnessProcessingUrl from .sst/outputs.json" >&2
            exit 1
          fi

          if [[ -z "${SST_SECRET_TelegramBotToken:-}" ]]; then
            echo "Missing Telegram bot token secret" >&2
            exit 1
          fi

          if [[ -z "${SST_SECRET_TelegramWebhookSecret:-}" ]]; then
            echo "Missing Telegram webhook secret" >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            "https://api.telegram.org/bot${SST_SECRET_TelegramBotToken}/setWebhook" \
            --data-urlencode "url=${FUNCTION_URL}" \
            --data-urlencode "secret_token=${SST_SECRET_TelegramWebhookSecret}" \
            --data 'allowed_updates=["message","edited_message"]'
