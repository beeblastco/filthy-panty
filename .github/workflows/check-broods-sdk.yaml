name: Check broods SDK Package

on:
  pull_request:
    paths:
      - 'packages/broods/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/check-broods-sdk.yaml'
      - '.github/workflows/publish-npm.yaml'
  push:
    branches-ignore:
      - main
    paths:
      - 'packages/broods/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/check-broods-sdk.yaml'
      - '.github/workflows/publish-npm.yaml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck SDK
        run: bun run --filter broods check

      - name: Test SDK
        run: bun run --filter broods test

      - name: Pack check
        working-directory: packages/broods
        run: bun run pack:check
