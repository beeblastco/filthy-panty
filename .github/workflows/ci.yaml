# CI for community / OSS builds (PRs + non-main pushes).
# Validates the core SST app workspace — DynamoDB path only.
# SaaS validation runs in deploy.yaml on main.

name: CI

on:
  pull_request:
    paths-ignore:
      - 'apps/docs/**'
      - '.github/workflows/deploy-docs.yaml'
      - '**/*.md'
  push:
    branches-ignore:
      - main
    paths-ignore:
      - 'apps/docs/**'
      - '.github/workflows/deploy-docs.yaml'
      - '**/*.md'

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      # sst.config.ts reads these at runtime (no in-source defaults). The postinstall
      # `sst install` needs them set, or it fails with "Project name is required".
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      PROJECT_OWNER_EMAIL: ${{ vars.PROJECT_OWNER_EMAIL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        # Skip workspace postinstall (`sst install`). This validation job does
        # not deploy infrastructure, and `bun run check` / `bun run build`
        # regenerate the prompt artifacts they need.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run check

      - name: Run unit tests
        run: bun run test

      - name: Build Lambda binaries
        run: bun run build
