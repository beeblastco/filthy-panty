name: Deploy Docs

on:
  push:
    branches: [main, dev]
    paths:
      - 'docs/**'
      - 'docusaurus.config.ts'
      - 'sidebar.ts'
      - 'static/**'
      - '.github/workflows/deploy-docs.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      S3_BUCKET: docs-beeblast-eu-central-1-403012596812
      DOCS_DOMAIN: docs.beeblast.co
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Docusaurus
        run: bun run docs:build

      - name: Upload to S3
        run: |
          aws s3 sync build/ "s3://${S3_BUCKET}" \
            --delete \
            --cache-control "public, max-age=3600, s-maxage=86400"

      - name: Invalidate CloudFront cache
        run: |
          set -euo pipefail

          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='${DOCS_DOMAIN}']].Id | [0]" \
            --output text)

          if [[ -z "$DIST_ID" || "$DIST_ID" == "None" ]]; then
            echo "::error::Could not find CloudFront distribution for ${DOCS_DOMAIN}"
            exit 1
          fi

          echo "Invalidating CloudFront distribution: $DIST_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
